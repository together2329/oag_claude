schema_version: oag_ambiguity_register.v1
ip: cortex_m7_systick
ambiguities:
- id: AMB_EXT_REFCLK
  question: Is an external reference clock implemented for SysTick (CLKSOURCE=0 source), and if so what
    is its frequency and source?
  status: resolved
  lock_required: true
  owner: happygrowth33
  resolution: For a standalone v1 IP, set NOREF=1 (no external reference clock), forcing CLKSOURCE=processor
    clock (FCLK) and eliminating CDC. Defer the external-reference variant to a MINOR follow-on. (Human
    lock confirm 2026-06-24.) See DEC_CLOCK_CDC.
  waiver_reason: null
  recommended: For a standalone v1 IP, set NOREF=1 (no external reference clock), forcing CLKSOURCE=processor
    clock (FCLK) and eliminating CDC. Defer the external-reference variant to a MINOR follow-on.
  rationale: ARMv7-M B3.3 marks the external reference clock as IMPLEMENTATION DEFINED (existence and
    frequency); Cortex-M7 ties NOREF to CFGSTCALIB[25]. Whether an external reference clock exists is
    the single decision that determines whether any CDC path exists. A concrete frequency cannot be cited
    as truth.
  source_claim_refs:
  - CLAIM_CLKSOURCE
  - CLAIM_EXT_REFCLK_IMPDEF
  decision_refs:
  - DEC_CLOCK_CDC
  affects:
  - requirements
  - requirement_atoms
  - contracts
  - verification
- id: AMB_CDC_ASYNC
  question: If an external reference clock is implemented, is it SYNCHRONOUS or ASYNCHRONOUS to the processor
    clock (FCLK)?
  status: resolved
  lock_required: true
  owner: happygrowth33
  resolution: If an external reference is used, assume ASYNCHRONOUS-to-FCLK by default and require full
    CDC mitigation; only downgrade to synchronous handling with an explicit decision receipt proving a
    fixed derived relationship. For v1 (NOREF=1) this is not-applicable / waived. (Human lock confirm
    2026-06-24.) See DEC_CLOCK_CDC.
  waiver_reason: null
  recommended: If an external reference is used, assume ASYNCHRONOUS-to-FCLK by default and require full
    CDC mitigation; only downgrade to synchronous handling with an explicit decision receipt proving a
    fixed derived relationship. For v1 (NOREF=1) this is not-applicable / waived.
  rationale: ARM requires documenting the processor-to-reference relationship and accounting for metastability,
    skew, and jitter. If asynchronous, the 24-bit SYST_CVR read, the sticky COUNTFLAG, and the wrap/interrupt
    pulse all cross domains and require synchronizers; ontology/domain_intent.yaml becomes REQUIRED per
    the project CDC/RDC hard rules. This is design truth, not a citable value.
  source_claim_refs:
  - CLAIM_CLKSOURCE
  - CLAIM_EXT_REFCLK_IMPDEF
  - CLAIM_FCLK
  decision_refs:
  - DEC_CLOCK_CDC
  affects:
  - requirements
  - requirement_atoms
  - contracts
  - verification
- id: AMB_REFCLK_RATIO
  question: When an external reference clock is used, what is its frequency ratio to FCLK and what skew/jitter
    budget applies?
  status: waived
  lock_required: false
  owner: happygrowth33
  resolution: null
  waiver_reason: v1 is single-clock (NOREF=1, CLKSOURCE forced to processor clock); the external reference-clock
    CDC path is deferred to a minor follow-on. (Human lock confirm 2026-06-24.)
  recommended: 'Require the integrator to specify f(ref) and the guaranteed f(FCLK)/f(ref) ratio. Default
    CDC assumption: rely on no ratio; use a true CDC-safe pulse synchronizer so correctness holds for
    any ratio. Not-applicable for v1 (NOREF=1).'
  rationale: ARM cites clock skew and jitter as calibration concerns. The often-quoted 2.5x/half-speed
    slowdown figures are vendor/secondary, NOT in the primary ARM text, so the exact ratio is implementation-defined
    and must be supplied by the integrator and reflected in SDC/CDC constraints. Inventing a ratio would
    violate OAG discipline.
  source_claim_refs:
  - CLAIM_EXT_REFCLK_IMPDEF
  decision_refs:
  - DEC_CLOCK_CDC
  affects:
  - requirements
  - requirement_atoms
  - contracts
  - verification
- id: AMB_CDC_MITIGATION
  question: For an asynchronous external reference, what approved CDC mitigation applies to (a) the 24-bit
    SYST_CVR read, (b) the sticky COUNTFLAG, and (c) the wrap-driven SysTick interrupt pulse?
  status: waived
  lock_required: false
  owner: happygrowth33
  resolution: null
  waiver_reason: v1 is single-clock (NOREF=1, CLKSOURCE forced to processor clock); the external reference-clock
    CDC path is deferred to a minor follow-on. (Human lock confirm 2026-06-24.)
  recommended: (a) coherent capture/hold or Gray-coded handoff of SYST_CVR into FCLK (never per-bit synchronizers);
    (b) 2+ flop synchronizer for COUNTFLAG with a race-free clear-on-read handshake; (c) toggle/pulse
    synchronizer for the wrap/interrupt event into FCLK. Require static/formal CDC evidence. Not-applicable
    for v1 (NOREF=1).
  rationale: Project CDC/RDC hard rules forbid independent bit synchronizers for coherent multi-bit crossings
    and forbid simulation-only CDC closure. The 24-bit count read, COUNTFLAG, and the interrupt/wrap pulse
    are three distinct crossings each needing a named, approved mitigation plus static/formal evidence.
    Not citable as a fixed value.
  source_claim_refs:
  - CLAIM_FCLK
  decision_refs:
  - DEC_CLOCK_CDC
  affects:
  - requirements
  - requirement_atoms
  - contracts
  - verification
- id: AMB_REFCLK_PORT
  question: If an external reference clock exists, what is the top-level port name, direction, and polarity
    (is it an STCLK-style input)?
  status: waived
  lock_required: false
  owner: happygrowth33
  resolution: null
  waiver_reason: v1 is single-clock (NOREF=1, CLKSOURCE forced to processor clock); the external reference-clock
    CDC path is deferred to a minor follow-on. (Human lock confirm 2026-06-24.)
  recommended: Do not assume 'STCLK'. Define the external reference-clock port name/direction/polarity
    explicitly in the IP interface contract only if NOREF=0; otherwise omit it (NOREF=1).
  rationale: The 'STCLK' name is a Cortex-M3/M4-era convention; the Cortex-M7 r1p2 TRM (DDI0489F) does
    NOT define an STCLK signal and handles calibration via CFGSTCALIB[25:0], leaving the reference-clock
    wiring to the integrator. The port name must not be assumed to be 'STCLK'.
  source_claim_refs:
  - CLAIM_EXT_REFCLK_IMPDEF
  decision_refs:
  - DEC_CLOCK_CDC
  affects:
  - requirements
  - requirement_atoms
  - contracts
  - verification
- id: AMB_CLKSOURCE_RESET
  question: What is the reset value of SYST_CSR bit[2] CLKSOURCE for this IP?
  status: resolved
  lock_required: true
  owner: happygrowth33
  resolution: 'If NOREF=1 (no external clock, v1 default): CLKSOURCE effectively fixed at 1 (read-as-1,
    write-ignored). If an external reference exists: CLKSOURCE resets to 0 (external) and is software-writable.
    Keep consistent with the NOREF decision. (Human lock confirm 2026-06-24.) See DEC_CLOCK_CDC.'
  waiver_reason: null
  recommended: 'If NOREF=1 (no external clock, v1 default): CLKSOURCE effectively fixed at 1 (read-as-1,
    write-ignored). If an external reference exists: CLKSOURCE resets to 0 (external) and is software-writable.
    Keep consistent with the NOREF decision.'
  rationale: 'Table B3-7 footnote a explicitly excludes bit[2] from the all-zero CSR reset: CLKSOURCE
    resets to 0 if an external reference clock exists, but is forced to 1 and unclearable when SYST_CALIB.NOREF=1.
    So the effective reset depends on the external-clock/NOREF design choice and cannot be asserted independently.'
  source_claim_refs:
  - CLAIM_CSR_RESET
  - CLAIM_CLKSOURCE
  decision_refs:
  - DEC_CLOCK_CDC
  affects:
  - requirements
  - requirement_atoms
  - contracts
  - verification
- id: AMB_CALIB_TENMS
  question: What is the SYST_CALIB.TENMS[23:0] value (10ms/100Hz reload constant) for this IP/target?
  status: resolved
  lock_required: true
  owner: happygrowth33
  resolution: If software calibration support is not required, leave TENMS=0 (calibration unknown) and
    have firmware compute the reload from the known clock frequency. If a reference is supplied, set TENMS
    = round(f_ref * 10ms) - 1. Record as a decision receipt. (Human lock confirm 2026-06-24.) See DEC_CALIB_STRATEGY.
  waiver_reason: null
  recommended: If software calibration support is not required, leave TENMS=0 (calibration unknown) and
    have firmware compute the reload from the known clock frequency. If a reference is supplied, set TENMS
    = round(f_ref * 10ms) - 1. Record as a decision receipt.
  rationale: ARM marks SYST_CALIB reset as IMP DEF; Cortex-M7 drives TENMS from CFGSTCALIB[23:0] (SoC
    tie-off). TENMS=0 means 10ms calibration value not known. A concrete value cannot be cited as truth
    and must be decided per target.
  source_claim_refs:
  - CLAIM_CALIB_FIELDS
  decision_refs:
  - DEC_CALIB_STRATEGY
  affects:
  - requirements
  - requirement_atoms
  - contracts
  - verification
- id: AMB_CALIB_SKEW
  question: Is SYST_CALIB.SKEW (bit[30]) reporting the 10ms TENMS value as exact (0) or inexact (1)?
  status: resolved
  lock_required: true
  owner: happygrowth33
  resolution: 'Set SKEW=1 (inexact) unless the chosen reference clock produces an exact 10ms TENMS, in
    which case SKEW=0. Default with TENMS=0: SKEW=1. (Human lock confirm 2026-06-24.) See DEC_CALIB_STRATEGY.'
  waiver_reason: null
  recommended: 'Set SKEW=1 (inexact) unless the chosen reference clock produces an exact 10ms TENMS, in
    which case SKEW=0. Default with TENMS=0: SKEW=1.'
  rationale: 'SKEW reset is implementation-defined (Cortex-M7: CFGSTCALIB[24]). It cannot be asserted
    as a fixed value; it depends on whether the integrated clock frequency yields an exact 10ms TENMS.'
  source_claim_refs:
  - CLAIM_CALIB_FIELDS
  decision_refs:
  - DEC_CALIB_STRATEGY
  affects:
  - requirements
  - requirement_atoms
  - contracts
  - verification
- id: AMB_CALIB_NOREF
  question: Does this design implement a separate SysTick reference clock (NOREF=0) or only the processor
    clock (NOREF=1)?
  status: resolved
  lock_required: true
  owner: happygrowth33
  resolution: Set NOREF=1 (no separate reference clock) for v1, and verify SYST_CSR.CLKSOURCE is forced
    to processor clock. Set NOREF=0 only if the SoC routes a distinct SysTick reference clock; then define
    its frequency. (Human lock confirm 2026-06-24.) See DEC_CALIB_STRATEGY.
  waiver_reason: null
  recommended: Set NOREF=1 (no separate reference clock) for v1, and verify SYST_CSR.CLKSOURCE is forced
    to processor clock. Set NOREF=0 only if the SoC routes a distinct SysTick reference clock; then define
    its frequency.
  rationale: 'NOREF is IMPLEMENTATION DEFINED (Cortex-M7: CFGSTCALIB[25]) and is coupled to SYST_CSR.CLKSOURCE:
    NOREF=1 forces CLKSOURCE=1 read-only. Whether a reference clock exists is an integration/architecture
    decision that changes both the calibration register and the usable clock-source programming model.'
  source_claim_refs:
  - CLAIM_CALIB_FIELDS
  decision_refs:
  - DEC_CALIB_STRATEGY
  affects:
  - requirements
  - requirement_atoms
  - contracts
  - verification
- id: AMB_CALIB_RESET
  question: What is the concrete reset/tie-off value of the entire SYST_CALIB register (TENMS, SKEW, NOREF)
    for this IP/SoC?
  status: resolved
  lock_required: true
  owner: happygrowth33
  resolution: 'Treat as an integrator-supplied tie-off (CFGSTCALIB[25:0]). If no reference clock and no
    known 10ms value: NOREF=1, SKEW=1, TENMS=0 (CALIB=0xC0000000). Capture the actual target value as
    a locked design decision; do not hard-code in IP truth. (Human lock confirm 2026-06-24.) See DEC_CALIB_STRATEGY.'
  waiver_reason: null
  recommended: 'Treat as an integrator-supplied tie-off (CFGSTCALIB[25:0]). If no reference clock and
    no known 10ms value: NOREF=1, SKEW=1, TENMS=0 (CALIB=0xC0000000). Capture the actual target value
    as a locked design decision; do not hard-code in IP truth.'
  rationale: ARM marks SYST_CALIB reset as IMP DEF; Cortex-M7 drives it from CFGSTCALIB[25:0]. There is
    no architectural fixed value; reporting any specific number (e.g. a vendor's 0xC0000000 or an STM32
    150000) as truth would be invented.
  source_claim_refs:
  - CLAIM_CALIB_FIELDS
  - CLAIM_CALIB_CFGSTCALIB
  decision_refs:
  - DEC_CALIB_STRATEGY
  affects:
  - requirements
  - requirement_atoms
  - contracts
  - verification
- id: AMB_CFGSTCALIB_DYNAMIC
  question: Is SYST_CALIB a hardwired (static tie-off) read-only register, or can the integration drive
    CFGSTCALIB dynamically (introducing a CDC concern)?
  status: waived
  lock_required: false
  owner: happygrowth33
  resolution: null
  waiver_reason: v1 is single-clock (NOREF=1, CLKSOURCE forced to processor clock); the external reference-clock
    CDC path is deferred to a minor follow-on. (Human lock confirm 2026-06-24.)
  recommended: Tie CFGSTCALIB to static constants (recommended) so SYST_CALIB is effectively hardwired
    and no CDC concern exists. If it must be driven from another domain, classify the crossing in domain_intent
    and add synchronization.
  rationale: Cortex-M7 exposes CFGSTCALIB as input pins. ARM defines the register as RO to software, but
    whether the integrator holds CFGSTCALIB constant or varies it is an integration choice that affects
    CDC/sampling assumptions if the inputs are not in the core clock domain.
  source_claim_refs:
  - CLAIM_CALIB_CFGSTCALIB
  decision_refs:
  - DEC_CALIB_STRATEGY
  affects:
  - requirements
  - requirement_atoms
  - contracts
  - verification
- id: AMB_RVR_CVR_RESET
  question: Are SYST_RVR.RELOAD and SYST_CVR.CURRENT left UNKNOWN at reset (architectural default), or
    does this IP force a defined power-on value?
  status: resolved
  lock_required: false
  owner: happygrowth33
  resolution: Keep RVR/CVR architecturally UNKNOWN and rely on the software init sequence (write RVR,
    write CVR, then ENABLE). If a deterministic reset is desired for X-prop cleanliness, reset both to
    0 and record it as an IP-specific superset of the architecture (NOT ARM truth). (Human lock confirm
    2026-06-24.) See DEC_RESET_STRATEGY.
  waiver_reason: null
  recommended: Keep RVR/CVR architecturally UNKNOWN and rely on the software init sequence (write RVR,
    write CVR, then ENABLE). If a deterministic reset is desired for X-prop cleanliness, reset both to
    0 and record it as an IP-specific superset of the architecture (NOT ARM truth).
  rationale: ARM lists SYST_RVR and SYST_CVR reset as UNKNOWN; software must write RVR then CVR before
    enabling. A deterministic post-reset value is a design choice beyond the architectural definition
    (affects the reset contract and X-propagation verification). Asserting 0x000000 as ARM truth would
    be inventing truth.
  source_claim_refs:
  - CLAIM_RVR
  - CLAIM_CVR
  decision_refs:
  - DEC_RESET_STRATEGY
  affects:
  - requirements
  - requirement_atoms
  - contracts
  - verification
- id: AMB_RESET_STRATEGY
  question: Should SysTick registers use asynchronous or synchronous reset, what polarity, and what async-reset-deassertion
    policy applies?
  status: resolved
  lock_required: true
  owner: happygrowth33
  resolution: Synchronous active-low reset for the counter datapath; if any async reset is used, document
    an explicit async-reset deassertion (synchronized release) policy in ontology/domain_intent.yaml.
    SYST_CSR must reset to 0x00000000. (Human lock confirm 2026-06-24.) See DEC_RESET_STRATEGY.
  waiver_reason: null
  recommended: Synchronous active-low reset for the counter datapath; if any async reset is used, document
    an explicit async-reset deassertion (synchronized release) policy in ontology/domain_intent.yaml.
    SYST_CSR must reset to 0x00000000.
  rationale: ARM defines reset VALUES but not the RTL reset implementation. Async vs sync reset, polarity,
    and async-reset-deassertion synchronization are IP design decisions; per OAG CDC/RDC rule 7 the async
    reset deassertion policy must be explicit before reset closure.
  source_claim_refs: []
  decision_refs:
  - DEC_RESET_STRATEGY
  affects:
  - requirements
  - requirement_atoms
  - contracts
  - verification
- id: AMB_SUBWORD_ACCESS
  question: Does the IP need to support byte/halfword access to any SysTick register?
  status: resolved
  lock_required: false
  owner: happygrowth33
  resolution: Implement 32-bit word-aligned word access only; treat byte/halfword accesses as unsupported,
    matching ARMv7-M PPB rules. (Human lock confirm 2026-06-24.) See DEC_CSR_BUS_PROFILE.
  waiver_reason: null
  recommended: Implement 32-bit word-aligned word access only; treat byte/halfword accesses as unsupported,
    matching ARMv7-M PPB rules.
  rationale: Architecture defines SysTick as word-access-only (byte/halfword UNPREDICTABLE per B3.1.1).
    Supporting sub-word access would be a deliberate deviation the register description would have to
    state explicitly.
  source_claim_refs:
  - CLAIM_ACCESS
  decision_refs:
  - DEC_CSR_BUS_PROFILE
  affects:
  - requirements
  - requirement_atoms
  - contracts
  - verification
- id: AMB_CSR_BUS_PROFILE
  question: What is the register-access bus protocol for the four SysTick registers (e.g. internal SCS/PPB-style
    vs APB-style vs custom register port)?
  status: resolved
  lock_required: true
  owner: happygrowth33
  resolution: Define a simple word-only register-access port (address[4:2] decode of CSR/RVR/CVR/CALIB,
    write-enable, read-data) or an APB-lite slave; pick one and record it as a decision. Keep timer logic
    independent of the chosen bus. (Human lock confirm 2026-06-24.) See DEC_CSR_BUS_PROFILE.
  waiver_reason: null
  recommended: Define a simple word-only register-access port (address[4:2] decode of CSR/RVR/CVR/CALIB,
    write-enable, read-data) or an APB-lite slave; pick one and record it as a decision. Keep timer logic
    independent of the chosen bus.
  rationale: The real M7 internal core interface to the SCS is not publicly pinned; a standalone IP must
    DEFINE its own register-access interface. The timer logic is interface-agnostic, but the bus protocol
    is a product choice that must be decided before lock (lock-readiness rule for boundary/protocol).
  source_claim_refs: []
  decision_refs:
  - DEC_CSR_BUS_PROFILE
  affects:
  - requirements
  - requirement_atoms
  - contracts
  - verification
- id: AMB_EXC_REQUEST_STYLE
  question: Is the tick interrupt request output a single-cycle pulse on each qualified 1->0 transition
    (event-style) or a level/sticky request, and how does it relate to COUNTFLAG and to SCB clear-via-PENDSTCLR?
  status: resolved
  lock_required: true
  owner: happygrowth33
  resolution: Emit a single-cycle set-pending pulse on each qualified wrap event (count 1->0 with TICKINT=1);
    do not make the IP request sticky (SCB holds pending). Keep COUNTFLAG status fully independent of
    the request pulse. (Human lock confirm 2026-06-24.) See DEC_EXC_BOUNDARY.
  waiver_reason: null
  recommended: Emit a single-cycle set-pending pulse on each qualified wrap event (count 1->0 with TICKINT=1);
    do not make the IP request sticky (SCB holds pending). Keep COUNTFLAG status fully independent of
    the request pulse.
  rationale: DDI0403 defines the architectural pending contract but NOT the SysTick-to-SCB hardware request
    protocol (level vs pulse). The SCB ICSR holds pending state and software clears via PENDSTCLR; COUNTFLAG
    is independent of the request. The signalling style is a design choice affecting the contract and
    TB oracle.
  source_claim_refs:
  - CLAIM_ICSR_PEND
  decision_refs:
  - DEC_EXC_BOUNDARY
  affects:
  - requirements
  - requirement_atoms
  - contracts
  - verification
- id: AMB_DEBUG_HALT_QUALIFIER
  question: Does the IP expose/honor a debug-halt qualifier so the counter freezes while the processor
    is halted in Debug state?
  status: resolved
  lock_required: false
  owner: happygrowth33
  resolution: Provide a debug-halt qualifier input and gate decrement when halted, per ARM. If verified
    standalone without a debug interface, document 'no debug-halt' as an explicit environment assumption
    rather than silently omitting the behavior. (Human lock confirm 2026-06-24.) See DEC_DEBUG_HALT_SCOPE.
  waiver_reason: null
  recommended: Provide a debug-halt qualifier input and gate decrement when halted, per ARM. If verified
    standalone without a debug interface, document 'no debug-halt' as an explicit environment assumption
    rather than silently omitting the behavior.
  rationale: ARM states the counter does not decrement when halted in Debug state, which requires a debug/halt
    status input. Whether the standalone IP exposes this qualifier is an integration design choice affecting
    cycle-level counter behavior.
  source_claim_refs:
  - CLAIM_DEBUG_HALT
  decision_refs:
  - DEC_DEBUG_HALT_SCOPE
  affects:
  - requirements
  - requirement_atoms
  - contracts
  - verification
- id: AMB_DEBUG_READ_QUALIFIER
  question: Can the register-read path distinguish software (functional) reads from debugger reads so
    that only functional reads clear COUNTFLAG?
  status: resolved
  lock_required: false
  owner: happygrowth33
  resolution: Provide a debug-access qualifier on the register read path so only non-debug functional
    reads clear COUNTFLAG; if no debug port is in scope, document that all reads are functional reads
    and record the limitation. (Human lock confirm 2026-06-24.) See DEC_COUNTFLAG_SEMANTICS.
  waiver_reason: null
  recommended: Provide a debug-access qualifier on the register read path so only non-debug functional
    reads clear COUNTFLAG; if no debug port is in scope, document that all reads are functional reads
    and record the limitation.
  rationale: ARM mandates COUNTFLAG is cleared by a software read of SYST_CSR but NOT by debugger reads.
    Realizing this requires a debug-vs-functional access qualifier on the read path. If the IP cannot
    distinguish debug reads, this architectural requirement may be violated. The rule is fixed ARM truth;
    only its realization is a design choice.
  source_claim_refs:
  - CLAIM_COUNTFLAG
  decision_refs:
  - DEC_COUNTFLAG_SEMANTICS
  affects:
  - requirements
  - requirement_atoms
  - contracts
  - verification
- id: AMB_CVR_WRITE_WHEN_DISABLED
  question: Does a write to SYST_CVR clear the counter and COUNTFLAG even when SYST_CSR.ENABLE=0 (counter
    disabled)?
  status: resolved
  lock_required: true
  owner: happygrowth33
  resolution: Apply the CVR-write clear of CURRENT and COUNTFLAG unconditionally (independent of ENABLE);
    the subsequent reload from RVR advances only on the next timer clock while enabled. Capture as an
    explicit behavior contract. (Human lock confirm 2026-06-24.) See DEC_CVR_DISABLE_BEHAVIOR.
  waiver_reason: null
  recommended: Apply the CVR-write clear of CURRENT and COUNTFLAG unconditionally (independent of ENABLE);
    the subsequent reload from RVR advances only on the next timer clock while enabled. Capture as an
    explicit behavior contract.
  rationale: The ARM 'clears register and COUNTFLAG' wording does not condition on ENABLE, and this spec
    silence has produced divergent implementations (notably QEMU bugs). It must be pinned to a behavior/cycle
    contract before closure.
  source_claim_refs:
  - CLAIM_CVR
  decision_refs:
  - DEC_CVR_DISABLE_BEHAVIOR
  affects:
  - requirements
  - requirement_atoms
  - contracts
  - verification
- id: AMB_CVR_VISIBILITY
  question: After a CVR-clearing write while enabled, what value does a read return between the clearing
    write and the next timer clock, and when does CURRENT become the RVR value?
  status: resolved
  lock_required: true
  owner: happygrowth33
  resolution: 'Cycle rule: the write clears CURRENT to 0 same-cycle; a read before the next timer clock
    returns 0; CURRENT becomes the RVR (RELOAD) value at the next enabled timer clock. Encode as an explicit
    cycle_rule and scoreboard oracle. (Human lock confirm 2026-06-24.)'
  waiver_reason: null
  recommended: 'Cycle rule: the write clears CURRENT to 0 same-cycle; a read before the next timer clock
    returns 0; CURRENT becomes the RVR (RELOAD) value at the next enabled timer clock. Encode as an explicit
    cycle_rule and scoreboard oracle.'
  rationale: ARM says reload happens 'on the next timer clock', implying an immediate read after the clearing
    write (before any timer clock) returns 0. The exact cycle-accurate visibility (0, then RVR) is a temporal
    detail needed for cycle-contract and scoreboard expected values.
  source_claim_refs:
  - CLAIM_CVR
  decision_refs: []
  affects:
  - requirements
  - requirement_atoms
  - contracts
  - verification
- id: AMB_RELOAD_ZERO_POLICY
  question: Is RELOAD=0 treated as a legal-but-inert value (architecture default) or rejected/clamped
    by this IP?
  status: resolved
  lock_required: true
  owner: happygrowth33
  resolution: 'Mirror ARM exactly: accept RELOAD=0 as a legal write with no periodic event (counter holds
    0 after next wrap). Do not clamp, error, or wrap to 0xFFFFFF. (Human lock confirm 2026-06-24.)'
  waiver_reason: null
  recommended: 'Mirror ARM exactly: accept RELOAD=0 as a legal write with no periodic event (counter holds
    0 after next wrap). Do not clamp, error, or wrap to 0xFFFFFF.'
  rationale: ARM defines RELOAD=0 as a legal write that produces no SysTick exception/COUNTFLAG (no 1->0
    transition) and disables the counter on the next wrap. Deviating from 'accepted but inert' would violate
    locked protocol truth and break ARM-compatible firmware.
  source_claim_refs:
  - CLAIM_RELOAD_ZERO
  decision_refs: []
  affects:
  - requirements
  - requirement_atoms
  - contracts
  - verification
- id: AMB_REENABLE_RELOAD
  question: On enable->disable->re-enable with a non-zero held CVR, does the design ever auto-reload CVR
    on the re-enable edge?
  status: resolved
  lock_required: false
  owner: happygrowth33
  resolution: Disable must NOT clear COUNTFLAG or CVR; re-enable resumes the held countdown. Reload CVR
    from RVR only when the counter reaches 0 or after a CVR write. Add an assertion that no reload occurs
    on a bare disable->enable with non-zero held CVR. (Human lock confirm 2026-06-24.) See DEC_CVR_DISABLE_BEHAVIOR.
  waiver_reason: null
  recommended: Disable must NOT clear COUNTFLAG or CVR; re-enable resumes the held countdown. Reload CVR
    from RVR only when the counter reaches 0 or after a CVR write. Add an assertion that no reload occurs
    on a bare disable->enable with non-zero held CVR.
  rationale: Architecturally, disable freezes CVR and does not clear COUNTFLAG; re-enable resumes from
    the held CVR (reload only on wrap-through-0 or after a CVR write). The exact internal latch/cache
    is design-defined as long as observable behavior matches, but a wrong auto-reload on the enable edge
    is a common bug.
