- id: AMB_SYST_BOUNDARY
  question: What is the exact SysTick IP boundary versus SCB/NVIC for the exception interface?
  status: resolved
  lock_required: true
  owner: happygrowth33
  resolution: 'INSIDE: SYST_CSR/RVR/CVR/CALIB + 24-bit counter + wrap-to-zero detect + COUNTFLAG + a single
    qualified tick interrupt request output. OUT: ICSR PENDSTSET/PENDSTCLR, pending latch, priority, preemption,
    vectoring, vector-table entry 15. (Human lock confirm 2026-06-24.) See DEC_EXC_BOUNDARY.'
  waiver_reason: null
  recommended: 'INSIDE: SYST_CSR/RVR/CVR/CALIB + 24-bit counter + wrap-to-zero detect + COUNTFLAG + a
    single qualified tick interrupt request output. OUT: ICSR PENDSTSET/PENDSTCLR, pending latch, priority,
    preemption, vectoring, vector-table entry 15.'
  rationale: DDI0403 places SYST_CSR (TICKINT/COUNTFLAG) in the SysTick block but places PENDSTSET/PENDSTCLR,
    the pending latch, priority, preemption, and vectoring in SCB ICSR / the processor exception model.
    Including SCB state would over-scope the IP; excluding the request output would under-scope it.
  source_claim_refs: []
  decision_refs:
  - DEC_EXC_BOUNDARY
  affects:
  - requirements
  - requirement_atoms
