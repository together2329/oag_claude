schema: ontology_obligations.v1
ip: cortex_m7_systick
obligations:
- id: OBL_SYST_REGMAP
  requirement_refs:
  - REQ_SYST_REGMAP
  - REQ_SYST_ACCESS
  - REQ_SYST_CSR_FIELDS
  - REQ_SYST_RESERVED_BITS
  - REQ_SYST_CALIB_LAYOUT
  status: open
  text: Register map, word access, CSR/CALIB field layout, and reserved-bit policy match DDI0403 B3.3.
  trigger: a SysTick register access, clock edge, or reset event in this group's scope
  guarantee: CSR/RVR/CVR are RW and CALIB is RO at 0xE000E010/14/18/1C; CSR fields and CALIB fields sit at
    their architectural bit positions; reserved bits are RAZ/WI.
  observable: EVT_SYST_REGMAP scoreboard rows over CSR/CVR reads, COUNTFLAG, counter, and tick request
  oracle_projection: behavior_model.syst.regmap
  contracts:
  - CONTRACT_SYST_REGMAP
- id: OBL_SYST_COUNT
  requirement_refs:
  - REQ_SYST_ENABLE
  - REQ_SYST_COUNTDOWN
  status: open
  text: Enabled 24-bit counter decrements once per processor clock and wraps via RVR reload.
  trigger: a SysTick register access, clock edge, or reset event in this group's scope
  guarantee: While ENABLE=1 the counter decrements by 1 each clock; on reaching 0 it reloads RVR on the next
    clock; ENABLE=0 freezes counting.
  observable: EVT_SYST_COUNT scoreboard rows over CSR/CVR reads, COUNTFLAG, counter, and tick request
  oracle_projection: behavior_model.syst.count
  contracts:
  - CONTRACT_SYST_COUNT
- id: OBL_SYST_PERIOD
  requirement_refs:
  - REQ_SYST_PERIOD
  - REQ_SYST_RELOAD_LATENCY
  status: open
  text: Wrap period equals RELOAD+1 clocks with value 0 visible for exactly one cycle.
  trigger: a SysTick register access, clock edge, or reset event in this group's scope
  guarantee: Consecutive 1->0 wrap events are exactly (RELOAD+1) clocks apart; CURRENT=0 is observable for
    exactly one cycle before reload.
  observable: EVT_SYST_PERIOD scoreboard rows over CSR/CVR reads, COUNTFLAG, counter, and tick request
  oracle_projection: cycle_rules.syst.period
  contracts:
  - CONTRACT_SYST_PERIOD
- id: OBL_SYST_RELOAD
  requirement_refs:
  - REQ_SYST_RELOAD
  - REQ_SYST_RVR_STAGING
  status: open
  text: RVR is a staging reload value that applies at the next wrap, not immediately.
  trigger: a SysTick register access, clock edge, or reset event in this group's scope
  guarantee: Writing SYST_RVR updates RELOAD without reloading CVR; the new value loads only at the next wrap.
  observable: EVT_SYST_RELOAD scoreboard rows over CSR/CVR reads, COUNTFLAG, counter, and tick request
  oracle_projection: behavior_model.syst.reload
  contracts:
  - CONTRACT_SYST_RELOAD
- id: OBL_SYST_RELOAD_ZERO
  requirement_refs:
  - REQ_SYST_RELOAD_ZERO
  status: open
  text: 'RELOAD=0 is legal and inert: counter holds 0 and produces no further events.'
  trigger: a SysTick register access, clock edge, or reset event in this group's scope
  guarantee: After the next wrap with RELOAD=0 the counter loads 0 and holds 0, producing no 1->0 event; it
    never wraps to 0xFFFFFF.
  observable: EVT_SYST_RELOAD_ZERO scoreboard rows over CSR/CVR reads, COUNTFLAG, counter, and tick request
  oracle_projection: behavior_model.syst.reload_zero
  contracts:
  - CONTRACT_SYST_RELOAD_ZERO
- id: OBL_SYST_CVR
  requirement_refs:
  - REQ_SYST_CVR_READ
  - REQ_SYST_CVR_WRITE
  - REQ_SYST_CVR_RELOAD_NEXT
  status: open
  text: CVR read returns live count; any CVR write clears CVR and COUNTFLAG without an exception, reloading
    next clock.
  trigger: a SysTick register access, clock edge, or reset event in this group's scope
  guarantee: A CVR read returns the live count; any CVR write clears CURRENT and COUNTFLAG, ignores data,
    pends no exception, and reloads RVR on the next enabled clock.
  observable: EVT_SYST_CVR scoreboard rows over CSR/CVR reads, COUNTFLAG, counter, and tick request
  oracle_projection: behavior_model.syst.cvr
  contracts:
  - CONTRACT_SYST_CVR
- id: OBL_SYST_COUNTFLAG
  requirement_refs:
  - REQ_SYST_COUNTFLAG_SET
  - REQ_SYST_COUNTFLAG_CLEAR
  - REQ_SYST_DEBUG_READ
  status: open
  text: COUNTFLAG sets on 1->0 and clears only on a functional CSR read or any CVR write.
  trigger: a SysTick register access, clock edge, or reset event in this group's scope
  guarantee: COUNTFLAG[16] sets on the 1->0 transition; it clears on a functional SYST_CSR read or any SYST_CVR
    write; CSR and RVR writes do not clear it.
  observable: EVT_SYST_COUNTFLAG scoreboard rows over CSR/CVR reads, COUNTFLAG, counter, and tick request
  oracle_projection: behavior_model.syst.countflag
  contracts:
  - CONTRACT_SYST_COUNTFLAG
- id: OBL_SYST_TICKINT
  requirement_refs:
  - REQ_SYST_TICKINT
  - REQ_SYST_EXCEPTION
  status: open
  text: A qualified set-pending pulse is emitted on a natural 1->0 wrap when TICKINT=1, never for a CVR write.
  trigger: a SysTick register access, clock edge, or reset event in this group's scope
  guarantee: The IP asserts a single-cycle tick set-pending request when a natural 1->0 transition occurs
    AND TICKINT=1; it never asserts it for a CVR-write-to-zero or when TICKINT=0.
  observable: EVT_SYST_TICKINT scoreboard rows over CSR/CVR reads, COUNTFLAG, counter, and tick request
  oracle_projection: behavior_model.syst.tickint
  contracts:
  - CONTRACT_SYST_TICKINT
- id: OBL_SYST_CLKSOURCE
  requirement_refs:
  - REQ_SYST_CLKSOURCE
  - REQ_SYST_NOREF_COUPLING
  status: open
  text: With NOREF=1 (v1), CLKSOURCE is forced to processor clock and unclearable.
  trigger: a SysTick register access, clock edge, or reset event in this group's scope
  guarantee: When NOREF=1, SYST_CSR.CLKSOURCE reads as 1 and writes of 0 are ignored, keeping the processor
    clock as the only tick source.
  observable: EVT_SYST_CLKSOURCE scoreboard rows over CSR/CVR reads, COUNTFLAG, counter, and tick request
  oracle_projection: behavior_model.syst.clksource
  contracts:
  - CONTRACT_SYST_CLKSOURCE
- id: OBL_SYST_RESET
  requirement_refs:
  - REQ_SYST_RESET
  - REQ_SYST_INIT_SEQ
  status: open
  text: After async-assert/sync-deassert reset SYST_CSR=0x00000000 and the init sequence starts counting from
    RELOAD.
  trigger: a SysTick register access, clock edge, or reset event in this group's scope
  guarantee: After reset deassertion SYST_CSR=0x00000000 (ENABLE/TICKINT/COUNTFLAG=0, CLKSOURCE=1 under NOREF=1);
    the write-RVR/write-CVR/set-ENABLE sequence makes counting start from RELOAD.
  observable: EVT_SYST_RESET scoreboard rows over CSR/CVR reads, COUNTFLAG, counter, and tick request
  oracle_projection: behavior_model.syst.reset
  contracts:
  - CONTRACT_SYST_RESET
- id: OBL_SYST_DISABLE
  requirement_refs:
  - REQ_SYST_DISABLE_FREEZE
  status: open
  text: Disable freezes CVR and retains COUNTFLAG with no spurious reload on re-enable.
  trigger: a SysTick register access, clock edge, or reset event in this group's scope
  guarantee: Clearing ENABLE freezes CURRENT and leaves COUNTFLAG unchanged; re-enabling resumes from the
    held value with a reload only on wrap-through-0 or after a CVR write.
  observable: EVT_SYST_DISABLE scoreboard rows over CSR/CVR reads, COUNTFLAG, counter, and tick request
  oracle_projection: behavior_model.syst.disable
  contracts:
  - CONTRACT_SYST_DISABLE
- id: OBL_SYST_BOUNDARY
  requirement_refs:
  - REQ_SYST_BOUNDARY
  - REQ_SYST_DEBUG_HALT
  status: open
  text: Only the qualified tick request crosses the boundary; SCB pending/priority and debug-halt are out
    of scope.
  trigger: a SysTick register access, clock edge, or reset event in this group's scope
  guarantee: The IP's only exception-related output is the qualified tick request; it drives no ICSR pending/priority/vector
    state, and the counter has no debug-halt qualifier in v1 (explicit environment assumption).
  observable: EVT_SYST_BOUNDARY scoreboard rows over CSR/CVR reads, COUNTFLAG, counter, and tick request
  oracle_projection: behavior_model.syst.boundary
  contracts:
  - CONTRACT_SYST_BOUNDARY
