- id: DEC_RESET_STRATEGY
  question: Async vs sync reset, polarity, and async-reset-deassertion policy for the SysTick registers/counter?
  status: decided
  lock_required: true
  owner: happygrowth33
  recommended: Synchronous active-low reset for the counter datapath; if any async reset is used, document
    an explicit synchronized async-reset-deassertion policy in domain_intent.yaml. SYST_CSR resets to
    0x00000000.
  decision: Synchronous active-low reset for the counter datapath; if any async reset is used, document
    an explicit synchronized async-reset-deassertion policy in domain_intent.yaml. SYST_CSR resets to
    0x00000000.
  decided_by:
    kind: human
    id: happygrowth33
  rationale: Human confirmed the recommended default at lock (single-clock v1 SysTick).
  affects:
  - REQ_SYST_RESET
  - AMB_RESET_STRATEGY
  - AMB_RVR_CVR_RESET
  refs:
