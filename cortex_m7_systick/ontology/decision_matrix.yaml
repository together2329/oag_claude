- id: DEC_CSR_BUS_PROFILE
  question: Which register-access bus profile does the SysTick IP expose for SYST_CSR/RVR/CVR/CALIB?
  status: decided
  lock_required: true
  owner: happygrowth33
  recommended: Define a simple word-only register-access port (address[4:2] decode, write-enable, read-data)
    or an APB-lite slave; pick one and record it. Timer logic stays bus-agnostic.
  decision: Define a simple word-only register-access port (address[4:2] decode, write-enable, read-data)
    or an APB-lite slave; pick one and record it. Timer logic stays bus-agnostic.
  decided_by:
    kind: human
    id: happygrowth33
