- id: DEC_CLOCK_CDC
  question: Is STCLK/external reference clock in scope (NOREF=0, dual-clock CDC) or is v1 single-clock
    processor-clock-only (NOREF=1)?
  status: decided
  lock_required: true
  owner: happygrowth33
  recommended: 'v1 single-clock: NOREF=1, CLKSOURCE forced to processor clock (FCLK), no CDC path. Defer
    the asynchronous external-reference variant to a MINOR follow-on requiring domain_intent.yaml and
    static/formal CDC evidence.'
  decision: 'v1 single-clock: NOREF=1, CLKSOURCE forced to processor clock (FCLK), no CDC path. Defer
    the asynchronous external-reference variant to a MINOR follow-on requiring domain_intent.yaml and
    static/formal CDC evidence.'
  decided_by:
    kind: human
    id: happygrowth33
  rationale: Human confirmed the recommended default at lock (single-clock v1 SysTick).
  affects:
  - REQ_SYST_CLKSOURCE
