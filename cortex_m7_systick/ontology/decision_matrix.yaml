  decided_round: lock_confirm_20260624
- id: DEC_EXC_BOUNDARY
  question: What is the SysTick-to-SCB exception interface boundary and request signalling style (pulse
    vs level)?
  status: decided
  lock_required: true
  owner: happygrowth33
  recommended: IP emits a single-cycle qualified set-pending pulse on each natural 1->0 wrap with TICKINT=1;
    SCB/NVIC owns ICSR PENDSTSET/PENDSTCLR, the pending latch, priority, and vectoring (out of scope).
    COUNTFLAG independent of the request.
  decision: IP emits a single-cycle qualified set-pending pulse on each natural 1->0 wrap with TICKINT=1;
    SCB/NVIC owns ICSR PENDSTSET/PENDSTCLR, the pending latch, priority, and vectoring (out of scope).
    COUNTFLAG independent of the request.
  decided_by:
    kind: human
    id: happygrowth33
  rationale: Human confirmed the recommended default at lock (single-clock v1 SysTick).
