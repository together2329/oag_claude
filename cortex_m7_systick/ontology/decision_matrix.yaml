- id: DEC_RELOAD_WIDTH
  question: Confirm the RELOAD/CURRENT counter width is the architectural 24 bits with [31:24] reserved.
  status: decided
  lock_required: true
  owner: happygrowth33
  recommended: 'Implement the architectural 24-bit counter: RELOAD[23:0] and CURRENT[23:0]; reserved upper
    bits RAZ/WI. Do not widen or narrow the counter.'
  decision: 'Implement the architectural 24-bit counter: RELOAD[23:0] and CURRENT[23:0]; reserved upper
    bits RAZ/WI. Do not widen or narrow the counter.'
  decided_by:
    kind: human
    id: happygrowth33
  rationale: Human confirmed the recommended default at lock (single-clock v1 SysTick).
  affects:
