  decided_round: lock_confirm_20260624
- id: DEC_CALIB_STRATEGY
  question: How are SYST_CALIB TENMS/SKEW/NOREF values supplied, given they are implementation-defined
    (CFGSTCALIB tie-off)?
  status: decided
  lock_required: true
  owner: happygrowth33
  recommended: 'Treat SYST_CALIB as an integrator-supplied tie-off (CFGSTCALIB[25:0]). Default with no
    reference clock and no known 10ms value: NOREF=1, SKEW=1, TENMS=0 (CALIB=0xC0000000). Do not hard-code
    as architectural truth; capture target value in a decision receipt.'
  decision: 'Treat SYST_CALIB as an integrator-supplied tie-off (CFGSTCALIB[25:0]). Default with no reference
    clock and no known 10ms value: NOREF=1, SKEW=1, TENMS=0 (CALIB=0xC0000000). Do not hard-code as architectural
    truth; capture target value in a decision receipt.'
  decided_by:
    kind: human
    id: happygrowth33
  rationale: Human confirmed the recommended default at lock (single-clock v1 SysTick).
  affects:
  - REQ_SYST_CALIB_LAYOUT
  - REQ_SYST_NOREF_COUPLING
