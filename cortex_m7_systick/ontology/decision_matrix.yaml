- id: DEC_COUNTFLAG_SEMANTICS
  question: 'Confirm COUNTFLAG semantics: bit[16] RO, set on 1->0, clear on functional CSR read or any
    CVR write, no clear on debug read / CSR write / RVR write.'
  status: decided
  lock_required: true
  owner: happygrowth33
  recommended: Implement COUNTFLAG at bit[16] (RO), set on the 1->0 transition, cleared only by a functional
    SYST_CSR read or any SYST_CVR write; debug reads, CSR writes, and RVR writes do not clear it. Require
    a debug-access qualifier or record the no-debug-distinction limitation.
  decision: Implement COUNTFLAG at bit[16] (RO), set on the 1->0 transition, cleared only by a functional
    SYST_CSR read or any SYST_CVR write; debug reads, CSR writes, and RVR writes do not clear it. Require
    a debug-access qualifier or record the no-debug-distinction limitation.
  decided_by:
    kind: human
    id: happygrowth33
  rationale: Human confirmed the recommended default at lock (single-clock v1 SysTick).
  affects:
  - REQ_SYST_COUNTFLAG_SET
  - REQ_SYST_COUNTFLAG_CLEAR
  - REQ_SYST_DEBUG_READ
  - AMB_DEBUG_READ_QUALIFIER
  refs:
  - req/ambiguity_register.yaml
  decided_round: lock_confirm_20260624
- id: DEC_CVR_DISABLE_BEHAVIOR
  question: Does a CVR write clear CVR/COUNTFLAG when ENABLE=0, and does disable->re-enable avoid a spurious
    reload?
  status: decided
  lock_required: true
  owner: happygrowth33
  recommended: Apply CVR-write clear unconditionally (independent of ENABLE); disable freezes CVR and
    retains COUNTFLAG; re-enable resumes the held count with reload only on wrap-through-0 or after a
    CVR write. Add an assertion against spurious reload on the enable edge.
  decision: Apply CVR-write clear unconditionally (independent of ENABLE); disable freezes CVR and retains
    COUNTFLAG; re-enable resumes the held count with reload only on wrap-through-0 or after a CVR write.
    Add an assertion against spurious reload on the enable edge.
  decided_by:
    kind: human
    id: happygrowth33
  rationale: Human confirmed the recommended default at lock (single-clock v1 SysTick).
  affects:
  - REQ_SYST_CVR_WRITE
  - REQ_SYST_DISABLE_FREEZE
  - AMB_CVR_WRITE_WHEN_DISABLED
  - AMB_REENABLE_RELOAD
  refs:
  - req/ambiguity_register.yaml
  decided_round: lock_confirm_20260624
