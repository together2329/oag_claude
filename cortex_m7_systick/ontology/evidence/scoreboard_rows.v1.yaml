schema: evidence_schema.v1
id: scoreboard_rows.v1
artifact: sim/scoreboard_events.jsonl
format: jsonl
policy:
  tb_implementation: free
  accepted_tb_styles:
    - verilog
    - systemverilog
    - uvm
    - cocotb
    - python
    - simulator_adapter
  fixed_contract: row semantics and required fields
required_fields:
  - goal_id
  - scenario_id
  - cycle
  - stimulus
  - expected
  - observed
  - observed_source
  - passed
  - mismatch
  - coverage_refs
expected_source_kinds:
  - behavior_model
  - cycle_rules
  - fl_model
  - cl_model
  - formal_property
  - golden_vector
  - assertion
  - manual_spec
  - reference_log
  - approved_equivalent_oracle
observed_source_kinds:
  - dut_signal
  - monitor
  - waveform
  - transaction
  - assertion
  - interface_sample
  - bus_monitor
rules:
  - observed_source.kind must describe DUT observation, not a model source
  - observed must be sampled from DUT-facing signals, monitors, waves, transactions, or assertions
  - expected may come from behavior_model, cycle_rules, approved FL/CL, formal property, golden vector, or approved equivalent oracle
  - manual_spec expected_source is provisional smoke/debug evidence only and cannot close an obligation unless linked to a decision receipt or replaced by model/cycle/formal refs
  - approved_equivalent_oracle expected_source requires decision_receipt_id, approver, scope, substitute_artifact, reason_full_model_not_required, and obligations_covered
  - a passing row must not carry a mismatch explanation
  - a failing row must carry a mismatch explanation
