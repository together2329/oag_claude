schema: action_schema.v1
id: failure_ticket.v1
artifact: handoff/failure_tickets/<ticket_id>.json
required_fields:
  - failing_contract
  - owner_workflow
  - expected
  - observed
  - evidence
  - editable_files
  - forbidden_edits
  - required_evidence_after_patch
rule: agents repair one unclosed contract at a time and never edit locked truth
