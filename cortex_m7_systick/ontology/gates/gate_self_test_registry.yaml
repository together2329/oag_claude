schema: oag_gate_self_test_registry.v1
ip: cortex_m7_systick
gates:
  - id: scoreboard_rows.v1
    validator: oag.inspect.scoreboard
    status: covered
    positive_fixture: sim/scoreboard_events.jsonl
    mutation_tests: [missing_observed_source, model_observed_source, empty_observed]
  - id: design_truth_graph
    validator: oag.compile
    status: covered
    positive_fixture: ontology/requirements.yaml
    mutation_tests: [missing_requirement_id, orphan_obligation, orphan_contract]
  - id: stage_run_receipt.v1
    validator: oag.check.stage_receipts
    status: open
    mutation_tests: [missing_output, fingerprint_mismatch]
  - id: formal_assertion_auto_research
    validator: oag.check.auto_research
    status: covered
    mutation_tests: [development_formal_marked_closed, missing_bounded_limitation, missing_contract_signoff_limitation]
  - id: improvement_metrics
    validator: oag.metrics
    status: covered
    mutation_tests: [metrics_snapshot_missing_history, closure_percent_regression_visibility]
  - id: readiness_handoff
    validator: oag.check.handoff
    status: covered
    mutation_tests: [development_marked_signoff_ready, numeric_summary_mismatch, missing_handoff_evidence_ref]
  - id: protected_fields
    validator: oag.check.protection
    status: covered
    mutation_tests: [unapproved_locked_truth_edit, missing_protection_policy]
  - id: append_only_ledger
    validator: oag.check.ledger
    status: covered
    mutation_tests: [payload_tamper, prev_hash_mismatch, invalid_jsonl]
  - id: monotonic_closure
    validator: oag.check.monotonic
    status: covered
    mutation_tests: [closed_to_open_without_decision]
  - id: module_file_boundary
    validator: oag.compile.decomposition
    status: covered
    mutation_tests: [greenfield_modules_share_file_without_rationale]
  - id: verified_completion
    validator: oag.check.closure_matrix
    status: covered
    mutation_tests: [missing_validation_status, stale_evidence_hash, missing_decision_receipt]
