schema_version: oag_tb_methodology.v1
ip: cortex_m7_systick
methodology_policy:
  profile: simple_leaf_register_peripheral
  framework_required: false
  full_uvm_required: false
  default_depth: directed_table_driven_micro_tb
  random_requires_constraints: true
  random_requires_coverage_goals: true
  failed_tests_count_for_coverage: false
  special_domain_sim_only_closure_allowed: false
architecture_roles:
  driver:
    status: planned
    responsibility: drive APB-lite CSR accesses and clock/reset stimulus from scenario intent
  monitor:
    status: planned
    responsibility: observe DUT CSR reads, counter, COUNTFLAG, and tick_irq
  predictor:
    status: planned
    responsibility: compute expected from behavior_model.syst.* / cycle_rules.syst.* reference model
  scoreboard:
    status: planned
    responsibility: emit scoreboard_rows.v1 compare rows
  coverage:
    status: planned
    responsibility: record contract-linked coverage for passing checks
  assertion_hooks:
    status: optional
    responsibility: local protocol/temporal/reset invariants (tick pulse, no-int-on-CVR-write, zero-one-cycle)
  evidence_writer:
    status: planned
    responsibility: write sim/scoreboard_events.jsonl and sim/scenario_mapping.json
