schema: action_schema.v1
id: oag_run_state.v1
artifact: ontology/runs/<run_id>/run_state.json
format: json
required_fields:
  - run_id
  - status
  - active_obligation
  - active_contracts
  - next_action
  - last_checkpoint
rule: run state drives one next action but closure remains governed by ROCEV records and decision receipts
