schema_version: oag_tb_methodology.v1
ip: mctp_tx_assembler
methodology_policy:
  profile: simple_leaf_apb_peripheral
  framework_required: false
  full_uvm_required: false
  default_depth: directed_table_driven_micro_tb
  random_requires_constraints: true
  random_requires_coverage_goals: true
  failed_tests_count_for_coverage: false
  special_domain_sim_only_closure_allowed: false
architecture_roles:
  driver:
    status: planned
    responsibility: drive legal and negative stimulus from scenario intent
  monitor:
    status: planned
    responsibility: observe DUT-facing signals or transactions
  predictor:
    status: planned
    responsibility: compute expected from behavior_model, cycle_rules, or approved oracle
  scoreboard:
    status: planned
    responsibility: emit scoreboard_rows.v1 compare rows
  coverage:
    status: planned
    responsibility: record contract-linked coverage for passing checks
  assertion_hooks:
    status: optional
    responsibility: capture local protocol, temporal, reset, or invariant rules
  result_writer:
    status: planned
    responsibility: emit sim/results.xml, sim/scenario_mapping.json, sim/scoreboard_events.jsonl, and cov/coverage.json when in scope
stimulus_strategy:
  directed_smoke: true
  table_driven_register_tests: true
  constrained_random:
    enabled: false
    constraints: []
    seed_strategy: TBD
coverage_goals:
  - id: COV_TX_INTAKE
    requirement: REQ_TX_INTAKE
    obligation: OBL_TX_INTAKE
    contract: CONTRACT_TX_INTAKE
    description: Message intake (streaming + last-flag + attribute word) exercised.
  - id: COV_TX_FRAGMENT_BOUNDARIES
    requirement: REQ_TX_FRAGMENT
    obligation: OBL_TX_FRAGMENT
    contract: CONTRACT_TX_FRAGMENT
    description: Fragmentation boundaries (multi-packet, short final packet) covered.
  - id: COV_TX_SOM_EOM
    requirement: REQ_TX_SOM_EOM
    obligation: OBL_TX_SOM_EOM
    contract: CONTRACT_TX_SOM_EOM
    description: SOM/EOM marking incl. single-packet SOM=EOM=1 covered.
  - id: COV_TX_SEQNUM_WRAP
    requirement: REQ_TX_SEQNUM
    obligation: OBL_TX_SEQNUM
    contract: CONTRACT_TX_SEQNUM
    description: Packet sequence number including a genuine mod-4 wrap (3->0) covered.
  - id: COV_TX_HEADER_FIELDS
    requirement: REQ_TX_HEADER
    obligation: OBL_TX_HEADER
    contract: CONTRACT_TX_HEADER
    description: DSP0236 header field composition/ownership/byte-order covered.
  - id: COV_TX_SINGLEMSG
    requirement: REQ_TX_SINGLEMSG
    obligation: OBL_TX_SINGLEMSG
    contract: CONTRACT_TX_SINGLEMSG
    description: Single-message-at-a-time / no interleaving covered.
  - id: COV_TX_ERR_MATRIX
    requirement: REQ_TX_ERR
    obligation: OBL_TX_ERR
    contract: CONTRACT_TX_ERR
    description: Error matrix (backpressure, underrun, oversize, zero-length) covered.
  - id: COV_TX_STATUS
    requirement: REQ_TX_STATUS
    obligation: OBL_TX_STATUS
    contract: CONTRACT_TX_STATUS
    description: Done/error IRQ and sent/dropped counters covered.
  - id: COV_TX_RESET
    requirement: REQ_TX_RESET
    obligation: OBL_TX_RESET
    contract: CONTRACT_TX_RESET
    description: Reset/default observable state covered.
assertion_candidates: []
formal_candidates: []
notes:
  - TB methodology is profile-scaled and framework-neutral.
  - UVM, cocotb, SV, Verilog, OSVVM, UVVM, or simulator adapters are choices, not truth.
  - Failed tests and failed scoreboard rows must not contribute to closure coverage.
