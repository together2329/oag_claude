schema: ontology_contracts.v1
ip: mctp_tx_assembler
contracts:
  - id: CONTRACT_TX_INTAKE
    obligation: OBL_TX_INTAKE
    contract_type: interface_protocol
    status: draft
    variables:
      input_valid: source asserts a body beat is valid
      input_ready: DUT accepts a body beat
      input_last: final body beat marker
      attribute_word: {dest_eid, msg_tag, to, msg_type}
    assume:
      env: Source presents attribute_word on the first beat and input_last on the final beat.
    guarantee:
      dut: Every beat with input_valid and input_ready is captured; context latched from the first beat.
    behavior_refs: [behavior_model.tx.intake]
    cycle_rule_refs: [cycle_rules.tx.intake_handshake]
    scenario_refs: [SCN_TX_INTAKE]
    scoreboard_row_refs: [EVT_TX_INTAKE]
    pass_condition: scoreboard_rows.v1 rows show captured context equals behavior_model.tx.intake for every scenario row, zero failed rows
    evidence_kinds: [scoreboard, assertion]
    evidence_schemas: [scoreboard_rows.v1]
    implementation_policy: TB language and simulator are not fixed by this contract
  - id: CONTRACT_TX_FRAGMENT
    obligation: OBL_TX_FRAGMENT
    contract_type: behavioral
    status: draft
    variables:
      body_len: captured message body length in bytes
      mtu_cfg: configured maximum packet payload in bytes
      packet_count: number of emitted packets
      packet_payload_len: per-packet payload length
    assume:
      env: mtu_cfg is stable while a message is in flight; body_len > 0.
    guarantee:
      dut: packet_count == ceil(body_len/mtu_cfg) and each payload <= mtu_cfg with only the final packet short.
    behavior_refs: [behavior_model.tx.fragment]
    scenario_refs: [SCN_TX_FRAGMENT]
    scoreboard_row_refs: [EVT_TX_FRAGMENT]
    pass_condition: scoreboard_rows.v1 rows show packet count and payload lengths equal behavior_model.tx.fragment, zero failed rows
    evidence_kinds: [scoreboard]
    evidence_schemas: [scoreboard_rows.v1]
    implementation_policy: TB language and simulator are not fixed by this contract
  - id: CONTRACT_TX_SOM_EOM
    obligation: OBL_TX_SOM_EOM
    contract_type: behavioral
    status: draft
    variables:
      packet_index: index of packet within message
      packet_count: total packets in message
      som_flag: start-of-message bit
      eom_flag: end-of-message bit
    assume:
      env: packet_count derives from the fragmentation contract.
    guarantee:
      dut: som_flag == (packet_index==0) and eom_flag == (packet_index==packet_count-1).
    behavior_refs: [behavior_model.tx.som_eom]
    scenario_refs: [SCN_TX_SOM_EOM]
    scoreboard_row_refs: [EVT_TX_SOM_EOM]
    pass_condition: scoreboard_rows.v1 rows show SOM/EOM equal behavior_model.tx.som_eom for every packet, zero failed rows
    evidence_kinds: [scoreboard, assertion]
    evidence_schemas: [scoreboard_rows.v1]
    implementation_policy: TB language and simulator are not fixed by this contract
  - id: CONTRACT_TX_SEQNUM
    obligation: OBL_TX_SEQNUM
    contract_type: temporal
    status: draft
    variables:
      packet_seq_num: 2-bit packet sequence number
      som_flag: start-of-message bit
      prev_seq: previous packet sequence number in this message
    assume:
      env: packets of one message are emitted in order.
    guarantee:
      dut: packet_seq_num == 0 if som_flag else (prev_seq + 1) mod 4.
    cycle_rule_refs: [cycle_rules.tx.seqnum]
    scenario_refs: [SCN_TX_SEQNUM]
    scoreboard_row_refs: [EVT_TX_SEQNUM]
    pass_condition: scoreboard_rows.v1 rows show sequence numbers equal cycle_rules.tx.seqnum across a multi-packet message, zero failed rows
    evidence_kinds: [scoreboard, assertion]
    evidence_schemas: [scoreboard_rows.v1]
    implementation_policy: TB language and simulator are not fixed by this contract
  - id: CONTRACT_TX_HEADER
    obligation: OBL_TX_HEADER
    contract_type: behavioral
    status: draft
    variables:
      header_version: fixed header version constant
      dest_eid: caller-supplied destination EID
      source_eid: CSR-programmed source EID
      to_bit: caller-supplied tag owner bit
      msg_tag: caller-supplied message tag
      header_bytes: serialized header byte vector
    assume:
      env: caller dest_eid/to/tag/msg_type stable for the message; source_eid CSR programmed before intake.
    guarantee:
      dut: header_bytes equal the DSP0236 layout of the composed fields and body bytes preserve input order.
    behavior_refs: [behavior_model.tx.header]
    scenario_refs: [SCN_TX_HEADER]
    scoreboard_row_refs: [EVT_TX_HEADER]
    pass_condition: scoreboard_rows.v1 rows show header byte vector and body order equal behavior_model.tx.header, zero failed rows
    evidence_kinds: [scoreboard]
    evidence_schemas: [scoreboard_rows.v1]
    implementation_policy: TB language and simulator are not fixed by this contract
  - id: CONTRACT_TX_SINGLEMSG
    obligation: OBL_TX_SINGLEMSG
    contract_type: protocol
    status: draft
    variables:
      busy_flag: a message is in flight
      input_ready: DUT accepts a new message
      eom_emitted: in-flight message EOM packet completed
    assume:
      env: source may offer a second message at any time.
    guarantee:
      dut: input_ready for a new message stays low until the cycle after eom_emitted; packets never interleave.
    cycle_rule_refs: [cycle_rules.tx.singlemsg]
    behavior_refs: [behavior_model.tx.intake]
    scenario_refs: [SCN_TX_SINGLEMSG]
    scoreboard_row_refs: [EVT_TX_SINGLEMSG]
    pass_condition: scoreboard_rows.v1 rows show no interleaving and intake gating equal cycle_rules.tx.singlemsg, zero failed rows
    evidence_kinds: [scoreboard, assertion]
    evidence_schemas: [scoreboard_rows.v1]
    implementation_policy: TB language and simulator are not fixed by this contract
  - id: CONTRACT_TX_ERR
    obligation: OBL_TX_ERR
    contract_type: error_negative
    status: draft
    variables:
      egress_ready: egress sink accepts a beat
      error_flag: error condition indicator
      error_counter: cumulative error count
      egress_valid: DUT drives a valid egress beat
    assume:
      env: egress_ready may deassert at any time; malformed inputs (underrun/oversize/zero-length) may occur.
    guarantee:
      dut: backpressure stalls with no byte lost; underrun/oversize/zero-length set error_flag and increment error_counter; no partial message is emitted.
    behavior_refs: [behavior_model.tx.err]
    scenario_refs: [SCN_TX_ERR_BACKPRESSURE, SCN_TX_ERR_UNDERRUN, SCN_TX_ERR_OVERSIZE, SCN_TX_ERR_ZEROLEN]
    negative_scenario_refs: [SCN_TX_ERR_UNDERRUN, SCN_TX_ERR_OVERSIZE, SCN_TX_ERR_ZEROLEN]
    scoreboard_row_refs: [EVT_TX_ERR]
    pass_condition: scoreboard_rows.v1 rows show stall-without-loss and error flag/counter equal behavior_model.tx.err for each negative scenario, zero failed rows
    evidence_kinds: [scoreboard, assertion]
    evidence_schemas: [scoreboard_rows.v1]
    implementation_policy: TB language and simulator are not fixed by this contract
  - id: CONTRACT_TX_STATUS
    obligation: OBL_TX_STATUS
    contract_type: interrupt_event
    status: draft
    variables:
      done_irq: per-message completion interrupt
      error_irq: error interrupt
      sent_counter: completed message count
      dropped_counter: dropped message count
    assume:
      env: host reads/clears status via CSR.
    guarantee:
      dut: done_irq pulses on EOM emission, error_irq pulses on error, and sent/dropped counters track outcomes.
    behavior_refs: [behavior_model.tx.status]
    cycle_rule_refs: [cycle_rules.tx.status_irq_timing]
    scenario_refs: [SCN_TX_STATUS]
    scoreboard_row_refs: [EVT_TX_STATUS]
    pass_condition: scoreboard_rows.v1 rows show IRQ pulses and counter values equal behavior_model.tx.status, zero failed rows
    evidence_kinds: [scoreboard, assertion]
    evidence_schemas: [scoreboard_rows.v1]
    implementation_policy: TB language and simulator are not fixed by this contract
  - id: CONTRACT_TX_RESET
    obligation: OBL_TX_RESET
    contract_type: reset
    status: draft
    variables:
      reset_n: active-low reset
      busy_flag: in-flight message indicator
      packet_seq_num: packet sequence number
      error_counter: error count
    assume:
      env: reset asserted asynchronously and deasserted synchronously to the clock.
    guarantee:
      dut: after synchronous deassertion busy_flag=0, packet_seq_num=0, error_counter=0, CSR fields at reset defaults.
    behavior_refs: [behavior_model.tx.reset]
    cycle_rule_refs: [cycle_rules.tx.reset_release]
    scenario_refs: [SCN_TX_RESET]
    scoreboard_row_refs: [EVT_TX_RESET]
    pass_condition: scoreboard_rows.v1 rows show post-reset observable state equals behavior_model.tx.reset, zero failed rows
    evidence_kinds: [scoreboard]
    evidence_schemas: [scoreboard_rows.v1]
    implementation_policy: TB language and simulator are not fixed by this contract
