schema: metrics_schema.v1
id: oag_improvement_metrics.v1
artifact: ontology/metrics/improvement_metrics.json
history: ontology/metrics/improvement_history.jsonl
format: json
scope: generic IP progress measurement; obligation counts are derived from each IP ontology and are not fixed
required_numeric_groups:
  - closure
  - check
  - evidence
  - stage_receipts
  - ledger
  - design
  - auto_research
  - decisions
rule: use oag.metrics after meaningful improvement boundaries so progress can be compared numerically across IPs
