schema: ontology_requirements.v1
ip: mctp_tx_assembler
requirements:
  - id: REQ_TX_INTAKE
    source: req/source_claims.yaml
    source_refs: [req/source_claims.yaml, ontology/decision_matrix.yaml]
    source_claim_refs: [CLAIM_TX_PRIMARY_INTENT]
    decision_refs: [DT001_MSG_SOURCE_IF, DT009_SPEC_SUBSET]
    status: locked
    requirement_type: protocol
    verification_method: [scoreboard, assertion]
    ambiguity_status: clear
    text: >-
      The IP shall accept one outbound MCTP message on a streaming input bus where a
      last-flag marks the final body beat, accompanied by a sideband attribute word
      carrying destination EID, message tag, TO bit, and message type/IC; the message
      body is treated as opaque payload.
  - id: REQ_TX_FRAGMENT
    source: req/source_claims.yaml
    source_refs: [req/source_claims.yaml, ontology/decision_matrix.yaml]
    source_claim_refs: [CLAIM_TX_PRIMARY_INTENT, CLAIM_TX_ASSEMBLY_INFERENCE]
    decision_refs: [DT002_EGRESS_BINDING_MTU, DT003_FRAGMENTATION_POLICY]
    status: locked
    requirement_type: behavioral
    verification_method: [scoreboard]
    ambiguity_status: clear
    text: >-
      The IP shall fragment the accepted message body into a sequence of MCTP packets
      whose per-packet payload never exceeds the configured MTU; the final packet may
      be shorter than the MTU; a message that fits in one packet shall produce exactly
      one packet.
  - id: REQ_TX_SOM_EOM
    source: req/source_claims.yaml
    source_refs: [req/source_claims.yaml, ontology/decision_matrix.yaml]
    source_claim_refs: [CLAIM_TX_ASSEMBLY_INFERENCE]
    decision_refs: [DT003_FRAGMENTATION_POLICY, DT004_HEADER_FIELD_OWNERSHIP]
    status: locked
    requirement_type: behavioral
    verification_method: [scoreboard, assertion]
    ambiguity_status: clear
    text: >-
      The IP shall set SOM=1 on the first packet of a message and EOM=1 on the last
      packet; a single-packet message shall have both SOM=1 and EOM=1; all other
      packets shall have SOM=0 and EOM=0.
  - id: REQ_TX_SEQNUM
    source: req/source_claims.yaml
    source_refs: [req/source_claims.yaml, ontology/decision_matrix.yaml]
    source_claim_refs: [CLAIM_TX_ASSEMBLY_INFERENCE]
    decision_refs: [DT004_HEADER_FIELD_OWNERSHIP]
    status: locked
    requirement_type: temporal
    verification_method: [scoreboard, assertion]
    ambiguity_status: clear
    text: >-
      The IP shall set the 2-bit packet sequence number to 0 on the SOM packet and
      increment it modulo 4 on each subsequent packet of the same message.
  - id: REQ_TX_HEADER
    source: req/source_claims.yaml
    source_refs: [req/source_claims.yaml, ontology/decision_matrix.yaml]
    source_claim_refs: [CLAIM_TX_ASSEMBLY_INFERENCE]
    decision_refs: [DT004_HEADER_FIELD_OWNERSHIP, DT005_TAG_POLICY, DT009_SPEC_SUBSET, D003_BYTE_ORDERING]
    status: locked
    requirement_type: behavioral
    verification_method: [scoreboard]
    ambiguity_status: clear
    text: >-
      Each emitted packet shall carry a transport header with a fixed header version,
      destination EID, TO, and message tag passed through from the caller, source EID
      from a CSR, and IP-computed SOM/EOM/sequence number; the header shall be emitted
      in DSP0236-defined byte layout and the body bytes in the order received.
  - id: REQ_TX_SINGLEMSG
    source: req/source_claims.yaml
    source_refs: [req/source_claims.yaml, ontology/decision_matrix.yaml]
    source_claim_refs: [CLAIM_TX_PRIMARY_INTENT]
    decision_refs: [DT006_MESSAGE_INTERLEAVE]
    status: locked
    requirement_type: protocol
    verification_method: [scoreboard, assertion]
    ambiguity_status: clear
    text: >-
      The IP shall process one message at a time; it shall accept a new message only
      after the current message has fully emitted its EOM packet, with no interleaving
      of packets from different messages.
  - id: REQ_TX_ERR
    source: req/source_claims.yaml
    source_refs: [req/source_claims.yaml, ontology/decision_matrix.yaml]
    source_claim_refs: [CLAIM_TX_PRIMARY_INTENT]
    decision_refs: [DT003_FRAGMENTATION_POLICY, DT007_ERROR_ABORT_POLICY]
    status: locked
    requirement_type: error_negative
    verification_method: [scoreboard, assertion]
    ambiguity_status: clear
    text: >-
      On egress backpressure the IP shall stall emission without dropping data; on
      source underrun (premature termination), oversize message, or a zero-length
      message it shall raise the corresponding status flag and increment the error
      counter; the IP shall never emit a partial message to egress.
  - id: REQ_TX_STATUS
    source: req/source_claims.yaml
    source_refs: [req/source_claims.yaml, ontology/decision_matrix.yaml]
    source_claim_refs: [CLAIM_TX_PRIMARY_INTENT]
    decision_refs: [DT008_STATUS_IRQ_CSR]
    status: locked
    requirement_type: interrupt_event
    verification_method: [scoreboard, assertion]
    ambiguity_status: clear
    text: >-
      The IP shall raise a per-message done interrupt when a message's EOM packet has
      been emitted, raise an error interrupt on any error condition, and maintain
      sent-message and dropped-message counters, all accessible over an APB-like CSR
      interface.
  - id: REQ_TX_RESET
    source: req/source_claims.yaml
    source_refs: [req/source_claims.yaml, ontology/decision_matrix.yaml]
    source_claim_refs: [CLAIM_TX_RESET_PLACEHOLDER]
    decision_refs: [DEC_MCTP_TX_ASSEMBLER_RESET_BOUNDARY]
    status: locked
    requirement_type: reset
    verification_method: [scoreboard]
    ambiguity_status: clear
    text: >-
      The IP shall use an asynchronously-asserted, synchronously-deasserted active-low
      reset; while reset is asserted and immediately after deassertion the IP shall be
      idle with no in-flight message, packet sequence number 0, error counters cleared,
      and all CSR fields at their defined reset values.
