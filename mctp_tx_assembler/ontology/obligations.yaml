schema: ontology_obligations.v1
ip: mctp_tx_assembler
obligations:
  - id: OBL_TX_INTAKE
    requirement: REQ_TX_INTAKE
    status: open
    text: Message intake captures body-to-last-flag and latches the attribute word.
    trigger: input stream offers a new message while IP is idle
    guarantee: all body beats to last-flag captured; dest EID/tag/TO/msg-type latched
    observable: input_ready handshake and latched message context
    oracle_projection: behavior_model.tx.intake
    contracts: [CONTRACT_TX_INTAKE]
  - id: OBL_TX_FRAGMENT
    requirement: REQ_TX_FRAGMENT
    status: open
    text: Body is fragmented into MTU-bounded packets with a possibly-short final packet.
    trigger: a non-empty captured message is ready to emit
    guarantee: packet count = ceil(body_len/MTU); each payload <= MTU; only last may be short
    observable: egress packet payload lengths and packet count
    oracle_projection: behavior_model.tx.fragment
    contracts: [CONTRACT_TX_FRAGMENT]
  - id: OBL_TX_SOM_EOM
    requirement: REQ_TX_SOM_EOM
    status: open
    text: SOM/EOM mark message boundaries correctly including single-packet case.
    trigger: a packet header is emitted
    guarantee: SOM only on first packet, EOM only on last; single packet sets both
    observable: egress header SOM/EOM bits
    oracle_projection: behavior_model.tx.som_eom
    contracts: [CONTRACT_TX_SOM_EOM]
  - id: OBL_TX_SEQNUM
    requirement: REQ_TX_SEQNUM
    status: open
    text: Packet sequence number starts at 0 and increments mod 4 across a message.
    trigger: a packet header is emitted
    guarantee: seq = 0 on SOM else (prev+1) mod 4
    observable: egress header sequence number
    oracle_projection: cycle_rules.tx.seqnum
    contracts: [CONTRACT_TX_SEQNUM]
  - id: OBL_TX_HEADER
    requirement: REQ_TX_HEADER
    status: open
    text: Header field composition, ownership, and byte ordering are correct.
    trigger: a packet header is emitted
    guarantee: header fields per ownership rules in DSP0236 byte layout; body order preserved
    observable: egress header bytes and body bytes
    oracle_projection: behavior_model.tx.header
    contracts: [CONTRACT_TX_HEADER]
  - id: OBL_TX_SINGLEMSG
    requirement: REQ_TX_SINGLEMSG
    status: open
    text: Exactly one message is processed at a time with no packet interleaving.
    trigger: input stream offers a new message while one is in flight
    guarantee: new message not accepted until in-flight message emits EOM
    observable: input_ready gating and per-packet message identity
    oracle_projection: cycle_rules.tx.singlemsg
    contracts: [CONTRACT_TX_SINGLEMSG]
  - id: OBL_TX_ERR
    requirement: REQ_TX_ERR
    status: open
    text: Backpressure stalls; underrun/oversize/zero-length flagged and counted; no partial emit.
    trigger: backpressure, underrun, oversize, or zero-length condition
    guarantee: stall without loss; error flag+counter on abort conditions; no partial message emitted
    observable: error flag, error counter, suppressed egress
    oracle_projection: behavior_model.tx.err
    contracts: [CONTRACT_TX_ERR]
  - id: OBL_TX_STATUS
    requirement: REQ_TX_STATUS
    status: open
    text: Done/error interrupts and sent/dropped counters reflect message outcomes.
    trigger: EOM emission or error event
    guarantee: done IRQ on EOM, error IRQ on error, counters updated, CSR-visible
    observable: done_irq, error_irq, sent/dropped counters via CSR
    oracle_projection: behavior_model.tx.status
    contracts: [CONTRACT_TX_STATUS]
  - id: OBL_TX_RESET
    requirement: REQ_TX_RESET
    status: open
    text: Reset/default observable state is known and mechanically checkable.
    trigger: async reset assert then synchronous deassert
    guarantee: idle, seq=0, counters cleared, CSR fields at reset defaults
    observable: busy flag, seq, counters, CSR reset values
    oracle_projection: behavior_model.tx.reset
    contracts: [CONTRACT_TX_RESET]
