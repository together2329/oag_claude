schema_version: oag_requirement_atoms.v1
ip: mctp_tx_assembler
policy:
  status: draft
  purpose: Semantic decomposition layer between requirement statements and obligations.
  lock_gate: complete requirement atoms before post-lock RTL, TB, or closure claims.
requirement_atoms:
  - id: ATOM_TX_INTAKE
    source_requirement_id: REQ_TX_INTAKE
    status: draft
    normalized_text: >-
      When a message is offered on the input stream, the IP captures body beats until
      the last-flag and latches the sideband attribute word as the message context.
    pattern:
      trigger: input stream valid handshake with a new message begins
      condition: IP is idle and able to accept a message
      response: body beats are accepted until last-flag; dest EID, tag, TO, msg type/IC latched
      timing: last-flag beat ends acceptance in the same cycle it is presented
      exception: backpressure when IP is busy with a prior message (see REQ_TX_SINGLEMSG)
    boundary:
      responsible_agent: dut
      environment_agents: [message_source]
    assumptions:
      environment:
        - Source asserts the attribute word coincident with the first body beat.
        - Source asserts last-flag on the final body beat.
      dut:
        - DUT owns capture and backpressure of the input stream.
    phenomena:
      monitored_variables: [input_valid, input_last, attribute_word]
      controlled_variables: [input_ready]
      dut_inputs: [input_valid, input_data, input_last, attribute_word]
      dut_outputs: [input_ready]
      controlled_state: [message_context]
      observable_outputs: [input_ready, latched_message_context]
    ambiguity:
      missing_terms: []
      open_questions: []
  - id: ATOM_TX_FRAGMENT
    source_requirement_id: REQ_TX_FRAGMENT
    status: draft
    normalized_text: >-
      The IP emits ceil(body_len/MTU) packets, each payload <= MTU, with only the final
      packet allowed to be shorter than MTU.
    pattern:
      trigger: a non-empty captured message is ready to emit
      condition: configured MTU is N bytes
      response: body split into packets of MTU bytes with a possibly-short final packet
      timing: packet payload length is determined before the packet's header beat
      exception: zero-length body is rejected (see REQ_TX_ERR)
    boundary:
      responsible_agent: dut
      environment_agents: [egress_sink]
    assumptions:
      environment:
        - Configured MTU is stable while a message is in flight.
      dut:
        - DUT computes packet boundaries from body length and MTU.
    phenomena:
      monitored_variables: [mtu_cfg, body_length]
      controlled_variables: [packet_count, packet_payload_length]
      dut_inputs: [mtu_cfg]
      dut_outputs: [egress_packet_payload]
      controlled_state: [bytes_remaining]
      observable_outputs: [egress_packet_payload_length, egress_packet_count]
    ambiguity:
      missing_terms: []
      open_questions: []
  - id: ATOM_TX_SOM_EOM
    source_requirement_id: REQ_TX_SOM_EOM
    status: draft
    normalized_text: >-
      SOM=1 only on the first packet, EOM=1 only on the last packet; a single-packet
      message asserts both.
    pattern:
      trigger: a packet header is being emitted
      condition: packet index within the message is known
      response: SOM=(index==0), EOM=(index==last); single packet sets both
      timing: SOM/EOM are valid on the packet header beat
      exception: none
    boundary:
      responsible_agent: dut
      environment_agents: []
    assumptions:
      environment: []
      dut:
        - DUT tracks first/last packet position within a message.
    phenomena:
      monitored_variables: []
      controlled_variables: [som_flag, eom_flag]
      dut_inputs: []
      dut_outputs: [egress_header_som, egress_header_eom]
      controlled_state: [packet_index, last_packet_index]
      observable_outputs: [egress_header_som, egress_header_eom]
    ambiguity:
      missing_terms: []
      open_questions: []
  - id: ATOM_TX_SEQNUM
    source_requirement_id: REQ_TX_SEQNUM
    status: draft
    normalized_text: >-
      Packet sequence number is 0 on the SOM packet and (prev+1) mod 4 on each later
      packet of the message.
    pattern:
      trigger: a packet header is being emitted
      condition: previous packet sequence number for this message is known
      response: seq = 0 if SOM else (prev_seq + 1) mod 4
      timing: sequence number valid on the packet header beat
      exception: none
    boundary:
      responsible_agent: dut
      environment_agents: []
    assumptions:
      environment: []
      dut:
        - DUT holds the running sequence counter per in-flight message.
    phenomena:
      monitored_variables: []
      controlled_variables: [packet_seq_num]
      dut_inputs: []
      dut_outputs: [egress_header_seq]
      controlled_state: [seq_counter]
      observable_outputs: [egress_header_seq]
    ambiguity:
      missing_terms: []
      open_questions: []
  - id: ATOM_TX_HEADER
    source_requirement_id: REQ_TX_HEADER
    status: draft
    normalized_text: >-
      Each packet header composes fixed version, caller dest EID/TO/tag, CSR source EID,
      and IP SOM/EOM/seq, emitted in DSP0236 byte order with order-preserving body.
    pattern:
      trigger: a packet header is being emitted
      condition: message context and source-EID CSR are valid
      response: header fields composed and serialized in DSP0236 byte layout; body bytes preserved in order
      timing: header beat precedes the packet's body beats
      exception: none
    boundary:
      responsible_agent: dut
      environment_agents: [csr_host, message_source]
    assumptions:
      environment:
        - Caller-supplied dest EID, TO, tag, and msg type are stable for the message.
        - Source-EID CSR is programmed before the message is offered.
      dut:
        - DUT composes and serializes the transport header.
    phenomena:
      monitored_variables: [attribute_word, source_eid_csr, header_version_const]
      controlled_variables: [egress_header_bytes]
      dut_inputs: [attribute_word, source_eid_csr]
      dut_outputs: [egress_header_bytes, egress_body_bytes]
      controlled_state: [header_field_mux]
      observable_outputs: [egress_header_bytes, egress_body_bytes]
    ambiguity:
      missing_terms: []
      open_questions: []
  - id: ATOM_TX_SINGLEMSG
    source_requirement_id: REQ_TX_SINGLEMSG
    status: draft
    normalized_text: >-
      A new message is accepted only after the current message's EOM packet has been
      emitted; packets of two messages never interleave.
    pattern:
      trigger: input stream offers a new message
      condition: a message is currently in flight
      response: new message is not accepted until the in-flight message emits EOM
      timing: acceptance gated until the cycle after EOM packet completion
      exception: none
    boundary:
      responsible_agent: dut
      environment_agents: [message_source]
    assumptions:
      environment: []
      dut:
        - DUT serializes message processing and gates intake on completion.
    phenomena:
      monitored_variables: [message_in_flight]
      controlled_variables: [input_ready]
      dut_inputs: [input_valid]
      dut_outputs: [input_ready]
      controlled_state: [busy_flag]
      observable_outputs: [input_ready, egress_packet_message_id]
    ambiguity:
      missing_terms: []
      open_questions: []
  - id: ATOM_TX_ERR
    source_requirement_id: REQ_TX_ERR
    status: draft
    normalized_text: >-
      Egress backpressure stalls emission with no data loss; underrun, oversize, and
      zero-length raise the matching flag and increment the error counter; no partial
      message is emitted.
    pattern:
      trigger: backpressure, source underrun, oversize message, or zero-length message
      condition: a message is being accepted or emitted
      response: stall on backpressure; on underrun/oversize/zero-length raise flag and increment error counter; suppress partial emission
      timing: error flag and counter update in the cycle the error is detected
      exception: none
    boundary:
      responsible_agent: dut
      environment_agents: [egress_sink, message_source]
    assumptions:
      environment:
        - Egress sink may deassert ready at any time.
      dut:
        - DUT detects underrun, oversize, and zero-length and owns the error response.
    phenomena:
      monitored_variables: [egress_ready, input_last, body_length, mtu_cfg]
      controlled_variables: [error_flag, error_counter, egress_valid]
      dut_inputs: [egress_ready, input_valid, input_last]
      dut_outputs: [egress_valid, error_flag, error_counter]
      controlled_state: [error_state]
      observable_outputs: [error_flag, error_counter, egress_valid]
    ambiguity:
      missing_terms: []
      open_questions: []
  - id: ATOM_TX_STATUS
    source_requirement_id: REQ_TX_STATUS
    status: draft
    normalized_text: >-
      A done IRQ pulses when an EOM packet is emitted, an error IRQ pulses on error,
      and sent/dropped counters update accordingly, all visible via CSR.
    pattern:
      trigger: EOM packet emitted or error condition detected
      condition: CSR interrupt enables are set
      response: done IRQ on EOM, error IRQ on error, sent/dropped counters incremented
      timing: IRQ asserted in the cycle the triggering event completes
      exception: none
    boundary:
      responsible_agent: dut
      environment_agents: [csr_host]
    assumptions:
      environment:
        - Host reads/clears status via the CSR interface.
      dut:
        - DUT owns interrupt generation and counter maintenance.
    phenomena:
      monitored_variables: [eom_emitted, error_event]
      controlled_variables: [done_irq, error_irq, sent_counter, dropped_counter]
      dut_inputs: [csr_read, csr_write]
      dut_outputs: [done_irq, error_irq, csr_readdata]
      controlled_state: [sent_counter, dropped_counter, status_reg]
      observable_outputs: [done_irq, error_irq, sent_counter, dropped_counter]
    ambiguity:
      missing_terms: []
      open_questions: []
  - id: ATOM_TX_RESET
    source_requirement_id: REQ_TX_RESET
    status: draft
    normalized_text: >-
      With active-low reset asserted (async) and after synchronous deassertion the IP
      is idle: no in-flight message, seq=0, error counters cleared, CSR at reset values.
    pattern:
      trigger: reset asserted asynchronously, then deasserted synchronously
      condition: clock is running for synchronous deassertion
      response: IP enters idle, seq=0, counters cleared, CSR fields at reset defaults
      timing: reset state observable on the first clock edge after synchronous deassertion
      exception: none
    boundary:
      responsible_agent: dut
      environment_agents: [reset_source]
    assumptions:
      environment:
        - Reset is asserted asynchronously and deasserted synchronously to the clock.
      dut:
        - DUT owns its reset/default observable state.
    phenomena:
      monitored_variables: [reset_n]
      controlled_variables: [idle_state, packet_seq_num, error_counter, csr_fields]
      dut_inputs: [reset_n, clk]
      dut_outputs: [busy_flag, error_counter, csr_readdata]
      controlled_state: [fsm_state, seq_counter, sent_counter, dropped_counter]
      observable_outputs: [busy_flag, packet_seq_num, error_counter, csr_reset_values]
    ambiguity:
      missing_terms: []
      open_questions: []
