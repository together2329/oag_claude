schema_version: oag_domain_intent.v1
ip: mctp_tx_assembler
policy:
  profile: simple_leaf_peripheral
  development_static_check_required: true
  release_requires_static_or_formal_cdc_rdc: true
clock_domains: []
reset_domains: []
async_inputs: []
cdc_crossings: []
rdc_crossings:
  - id: RDC_UNCLASSIFIED
    classification: no_known_rdc
    basis:
      - scaffold has no declared reset domains yet
    caveat:
      - async reset assertion/deassertion policy must be recorded when reset domains are declared
sync_structures: []
notes:
  - Domain intent is design truth for clocks, resets, async inputs, CDC crossings, and RDC crossings.
  - RTL may implement crossing safety, but RTL must not invent crossing intent.
