schema: evidence_schema.v1
id: cdc_rdc_report.v1
artifact: cdc/oag_domain_crossing_check.json or signoff CDC/RDC tool report
format: json_or_tool_report
required_fields:
  - schema_version
  - ip
  - status
  - domain_intent
  - evidence_strength
  - clock_domains
  - reset_domains
  - cdc_crossings
  - rdc_crossings
  - issues
rules:
  - development evidence may use lightweight structural checks and functional support scenarios
  - release closure requires static, formal, tool-grade, or approved equivalent evidence
  - simulation-only evidence is not CDC/RDC closure evidence
