schema: evidence_schema.v1
id: tb_methodology_report.v1
artifact: ontology/tb_methodology.yaml plus TB subagent receipt and sim/cov outputs
format: yaml_json_or_tool_report
required_fields:
  - schema_version
  - methodology_profile
  - architecture_roles
  - stimulus_strategy
  - expected_source_policy
  - coverage_strategy
  - result_artifacts
rules:
  - framework choice is free when evidence semantics are preserved
  - random closure requires constraints and coverage goals
  - failed tests and failed scoreboard rows do not count toward closure coverage
  - ordinary simulation-only evidence does not close CDC/RDC, low-power, safety, or AMS claims
