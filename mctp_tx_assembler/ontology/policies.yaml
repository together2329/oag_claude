schema: oag_policy.v1
ip: mctp_tx_assembler
closure_profile: development
execution_policy:
  hook_auto_continue_until: all
  stop_hook_max_repeats: 3
graph_policy:
  context_uses_cached_graph: true
  compile_skip_when_fresh: true
  strict_fresh_on: [checkpoint, check, signoff]
requirement_quality_policy:
  canonical_source_claims_file: req/source_claims.yaml
  canonical_ambiguity_register_file: req/ambiguity_register.yaml
  canonical_intake_dir: req/deep_semantic_intake
  require_quality_after_lock: true
  require_source_claims_after_lock: true
  unresolved_lock_ambiguity_blocks_implementation: true
  requirement_ambiguity_must_be_clear_or_waived: true
modeling_policy:
  canonical_modeling_file: ontology/modeling.yaml
  profile: simple_leaf_apb_peripheral
  full_fl_model_required: false
  full_cl_model_required: false
  behavior_model_required_for_behavioral_closure: true
  cycle_rules_required_for_temporal_closure: true
  scoreboard_trace_required_for_closure: true
requirement_decomposition_policy:
  canonical_requirement_atom_file: ontology/requirement_atoms.yaml
  require_atoms_after_lock: true
  require_assume_guarantee_for_closure: true
  shallow_obligations_block_closure: true
  open_questions_keep_draft: true
contract_strength_policy:
  canonical_contract_file: ontology/contracts.yaml
  require_contract_strength_after_lock: true
  require_variables_assume_guarantee_oracle: true
  weak_sim_pass_contract_is_smoke_only: true
decision_matrix_policy:
  canonical_decision_matrix_file: ontology/decision_matrix.yaml
  require_lock_required_decisions_after_lock: true
  unresolved_lock_required_blocks_implementation: true
  proposed_is_not_decided: true
  waived_requires_reason: true
verification_strategy_policy:
  canonical_verification_plan_file: ontology/verification_plan.yaml
  owner_role: oag-verification-strategy-agent
  tb_writer_may_define_strategy: false
  required_before_tb_dispatch_after_lock: true
  objectives_require_rocev_refs: true
  residual_risk_required_after_lock: true
authoring_packet_policy:
  canonical_authoring_packet_dir: ontology/generated/authoring_packets
  rtl_packet_pattern: rtl__*.json
  tb_packet_pattern: tb__*.json
  generated_by: oag.compile
  require_role_packets_before_dispatch: true
traceability_policy:
  require_trace_graph_after_lock: true
  source_to_contract_to_evidence_chain_required: true
  orphan_load_bearing_objects_block_closure: true
domain_crossing_policy:
  canonical_domain_intent_file: ontology/domain_intent.yaml
  profile: simple_leaf_peripheral
  domain_intent_required: true
  async_input_classification_required: true
  synchronizer_structure_required_for_async_inputs: true
  development_static_check_required: true
  full_cdc_tool_required_for_development: false
  full_rdc_tool_required_for_development: false
  release_requires_static_cdc_rdc_or_approved_applicability: true
tb_methodology_policy:
  canonical_tb_methodology_file: ontology/tb_methodology.yaml
  profile: simple_leaf_apb_peripheral
  framework_required: false
  full_uvm_required: false
  random_requires_constraints: true
  random_requires_coverage_goals: true
  coverage_refs_require_goals: true
  failed_tests_count_for_coverage: false
  results_xml_required_after_sim: true
  scenario_mapping_required_after_sim: true
  scoreboard_rows_required_after_sim: true
  special_domain_sim_only_closure_allowed: false
structure_policy:
  default_profile: small_leaf_single_file
  allowed_profiles: [greenfield_modular, small_leaf_single_file, legacy_preserve, wrapper_adapter]
  single_file_allowed_when: small leaf IP with explicit rationale and module ownership
  greenfield_modular_requires: [decomposition, module_ownership, unique_module_files, interface_contracts]
  legacy_preserve_requires: [legacy_sources, preserve_existing_hierarchy]
  wrapper_adapter_requires: [legacy_core, wrapper_module, boundary_contracts]
profiles:
  draft:
    intent: authoring and exploration
    may_claim_signoff: false
  development:
    intent: normal IP development with real evidence
    may_claim_signoff: false
  signoff:
    intent: audit-grade closure
    may_claim_signoff: true
action_policy:
  claim_complete:
    requires: [rocev_chain, explicit_validation_status, closure_matrix, evidence_hash_freshness, append_only_ledger, monotonic_closure, decision_receipt]
  close_obligation:
    requires: [rocev_chain, explicit_validation_status, closure_matrix, evidence_hash_freshness, append_only_ledger, monotonic_closure]
  promote:
    requires: [closed_validation, closure_matrix, decision_receipt, protected_fields_clean, human_review, enterprise_promotion_record]
  signoff:
    requires: [closed_obligations, closure_matrix, decision_receipt, truth_graph_compiled, fresh_stage_receipts, protected_fields_clean, append_only_ledger, monotonic_closure, human_approval]
rtl_policy:
  dialect: oag_sv_lite_v1
  base: verilog_2001
  allowed_extensions: [logic, generate]
  disallowed_constructs: [always_ff, always_comb, typedef, enum, struct, interface, package, class, assertions, covergroups]
ppa_policy:
  mode: ppa_aware_correctness_first
  require_ppa_notes_for_nontrivial_rtl: true
  simple_leaf_peripheral:
    default_strategy:
      performance: single_cycle_simple_decode
      power: explicit_write_enable
      area: no_unnecessary_pipeline_or_duplication
    pipeline_default: false
    clock_gating_default: infer_enable_only
