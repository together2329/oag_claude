schema: oag_design_rules.v1
ip: mctp_tx_assembler
rules:
  - id: RULE_REQUIREMENT_SEMANTIC_ATOMS
    kind: requirement_semantic_atoms
    status: active
    severity: block
    text: Locked requirements must decompose into requirement atoms before closure-grade obligations or contracts are used.
    applies_when: scope is locked, canonical ontology is promoted, or closure is claimed
    requires: [requirement, requirement_atom, trigger, response, boundary, phenomena, ambiguity_status]
  - id: RULE_REQUIREMENT_QUALITY_GATE
    kind: requirement_quality_gate
    status: active
    severity: block
    text: Lock-ready requirements must trace to source claims, clear or waive ambiguity, name type, and name verification method.
    applies_when: scope is locked, canonical ontology is promoted, RTL/TB/verification work is dispatched, or closure is claimed
    requires: [source_claim, ambiguity_register, requirement_type, source_refs, verification_method, ambiguity_status]
  - id: RULE_DECISION_MATRIX_LOCK_READINESS
    kind: decision_matrix_lock_readiness
    status: active
    severity: block
    text: Lock-required decisions must be decided or waived before post-lock implementation and closure work.
    applies_when: scope is locked, canonical ontology is promoted, RTL/TB/verification work is dispatched, or closure is claimed
    requires: [decision_matrix, lock_required, status, decision_or_waiver, owner]
  - id: RULE_ASSUME_GUARANTEE_CONTRACT
    kind: assume_guarantee_contract
    status: active
    severity: block
    text: Closure-grade contracts must separate environment assumptions from DUT guarantees.
    applies_when: behavioral, temporal, protocol, CSR, interrupt, ordering, reset, backpressure, or error contracts support closure
    requires: [contract, assume, guarantee, variables, oracle]
  - id: RULE_EVENT_STATE_COMMIT_CONSISTENCY
    kind: event_state_commit_consistency
    status: active
    severity: signoff_block
    text: Side-effect events and their state updates must use the same effective commit condition.
    applies_when: interrupts, status bits, FSM transitions, counters, FIFOs, or handshakes produce side effects
    requires: [event, state_update, commit_condition, contract]
  - id: RULE_SAME_CYCLE_PRIORITY_DECLARED
    kind: same_cycle_priority_declared
    status: active
    severity: signoff_block
    text: Same-cycle conflicts must name the winning action in requirement truth.
    applies_when: software writes, hardware updates, clears, sets, enables, disables, or terminal events can collide
    requires: [conflict, priority, requirement, obligation, contract]
  - id: RULE_SCOREBOARD_ROWS_V1
    kind: scoreboard_evidence_schema
    status: active
    severity: block
    text: Scoreboard evidence must use DUT-facing scoreboard_rows.v1 rows.
    applies_when: expected-versus-observed evidence is submitted
    requires: [goal_id, scenario_id, stimulus, expected, observed, observed_source, passed, mismatch, coverage_refs]
  - id: RULE_CONTRACT_TO_PROOF_COVERAGE
    kind: contract_to_proof_coverage
    status: active
    severity: signoff_block
    text: A contract may only claim a proof scope that is backed by matching assertion, scoreboard, formal, coverage, or log evidence.
    applies_when: any obligation is claimed closed
    requires: [contract, proof_scope, evidence_ref]
  - id: RULE_FAULT_MODEL_COVERAGE
    kind: fault_model_coverage
    status: active
    severity: signoff_block
    text: A load-bearing coverage point should name the requirement fault models it is meant to catch and, for signoff-grade claims, attach killed mutation evidence.
    applies_when: coverage_refs are used as closure evidence for a requirement or obligation
    requires: [requirement, obligation, contract, coverage_refs, fault_models, mutation_results]
  - id: RULE_VERIFICATION_ROLE_DECOMPOSITION
    kind: verification_role_decomposition
    status: active
    severity: signoff_block
    text: Signoff-grade verification should separate UVM-style roles without requiring a specific TB framework.
    applies_when: a testbench architecture is used as closure or signoff evidence
    required_roles: [sequence, driver, monitor, reference_model, scoreboard, coverage, env, test]
    requires: [requirement, obligation, contract, style, framework, roles, independence]
  - id: RULE_TB_METHODOLOGY_KERNEL
    kind: tb_methodology_kernel
    status: active
    severity: block
    text: TB closure evidence must use a profile-appropriate verification methodology without requiring a specific framework.
    applies_when: TB, simulation, scoreboard, coverage, assertion, formal, or scenario evidence is used for closure
    requires: [scenario_intent, driver_or_bfm, monitor, independent_predictor, scoreboard, coverage_strategy, result_writer]
  - id: RULE_VERIFICATION_STRATEGY_OWNS_PROOF
    kind: verification_strategy_owns_proof
    status: active
    severity: block
    text: Verification strategy must define objectives, proof methods, scenarios, coverage goals, and residual risk before TB implementation satisfies them.
    applies_when: locked TB, sim, scoreboard, coverage, assertion, formal, or closure evidence is planned or dispatched
    requires: [verification_plan, verification_objective, proof_methods, scenarios, coverage_goals, residual_risks]
  - id: RULE_CONTRACT_STRENGTH
    kind: contract_strength
    status: active
    severity: block
    text: Implementation-ready contracts must separate assume/guarantee, name variables, resolve oracle refs, and project proof scenarios or properties.
    applies_when: scope is locked, RTL/TB authoring packets are generated, validation is run, or closure is claimed
    requires: [contract, variables, assume, guarantee, oracle, proof_projection]
  - id: RULE_ROLE_SPECIFIC_AUTHORING_PACKETS
    kind: authoring_packet_role_projection
    status: active
    severity: block
    text: RTL and TB agents must consume role-specific authoring packets generated from OAG truth, not independently reinterpret original prose.
    applies_when: RTL or TB native subagent dispatch is prepared
    requires: [rtl_authoring_packet, tb_authoring_packet, contract_refs, expected_source_policy]
  - id: RULE_TRACE_GRAPH_ID_GOVERNANCE
    kind: trace_graph_id_governance
    status: active
    severity: block
    text: Load-bearing source claims, requirements, atoms, obligations, contracts, scenarios, scoreboard rows, and coverage goals must form an unbroken trace graph.
    applies_when: scope is locked, evidence is validated, gate review is run, or closure is claimed
    requires: [source_claim, requirement, requirement_atom, obligation, contract, scenario, evidence]
  - id: RULE_CDC_CROSSING_COVERAGE
    kind: cdc_crossing_coverage
    status: active
    severity: signoff_block
    text: Clock/reset-domain crossing claims must name domains/crossings and attach CDC/RDC review or tool evidence.
    applies_when: SSOT clock_reset_domains, cdc_requirements, or rdc_requirements are load-bearing closure facts
    requires: [requirement, obligation, contract, clock_domains_or_crossings, evidence_refs]
  - id: RULE_PROTOCOL_COMPLIANCE
    kind: protocol_compliance
    status: active
    severity: signoff_block
    text: Interface protocol claims such as AXI/APB/streaming handshakes must be backed by assertion, monitor, VIP, or protocol scoreboard evidence.
    applies_when: an interface protocol is used as a design or integration closure claim
    requires: [requirement, obligation, contract, protocol, evidence_refs]
  - id: RULE_TIMING_CLOSURE
    kind: timing_closure
    status: active
    severity: signoff_block
    text: STA/timing closure claims must name target frequency or target clocks, derive SDC from those clocks plus CDC policy, and cite timing reports with setup/hold status.
    applies_when: timing.target_clocks, timing.sta_expectations, SDC, syn, sta, or sta-post evidence is used for closure
    requires: [requirement, obligation, contract, target_clocks_or_target_frequency, sdc_refs, timing_reports, evidence_refs]
    default_io_delay_ratio: 0.5
  - id: RULE_FUNCTIONAL_COVERAGE_CLOSURE
    kind: functional_coverage_closure
    status: active
    severity: signoff_block
    text: Functional coverage closure must tie coverage goals to observed coverage refs and coverage reports.
    applies_when: coverage_functional, coverage_ssot, coverage.json, or scoreboard coverage refs are used as closure evidence
    requires: [requirement, obligation, contract, coverage_refs, coverage_goal, coverage_actual, evidence_refs]
  - id: RULE_RESET_XPROP_COVERAGE
    kind: reset_xprop_coverage
    status: active
    severity: signoff_block
    text: Reset and X-propagation closure must name reset scenarios or X-prop checks and attach observed evidence.
    applies_when: reset behavior, async assert/sync deassert, reset-domain behavior, or X-prop robustness is load-bearing
    requires: [requirement, obligation, contract, reset_scenarios_or_xprop_checks, coverage_refs, evidence_refs]
  - id: RULE_MODULE_FILE_BOUNDARY
    kind: module_file_boundary
    status: active
    severity: block
    text: Greenfield modular IPs should map each current_ip module to a unique RTL file; shared files require explicit rationale.
    applies_when: decomposition profile is greenfield_modular
    requires: [module, file, ownership, shared_file_rationale_for_exception]
  - id: RULE_RTL_LANGUAGE_SUBSET
    kind: rtl_language_subset
    status: active
    severity: block
    text: Generated RTL may use logic and Verilog generate for static elaboration; procedural loops remain forbidden outside generate blocks.
    applies_when: RTL is authored, generated, repaired, linted, or promoted
    allowed_constructs: [logic, generate, genvar, generate_for]
    forbidden_constructs: [procedural_for, procedural_while, procedural_repeat, procedural_forever, always_ff, always_comb, always_latch, package, import, interface, modport, typedef, enum, struct, class, assertions, covergroups]
    requires: [rtl_compile_report, language_policy]
instances:
  - id: TEMPLATE_EVENT_STATE_COMMIT
    rule: RULE_EVENT_STATE_COMMIT_CONSISTENCY
    status: template
    note: Activate when this IP has side-effect events such as interrupts, status bits, FSM transitions, or terminal ticks.
  - id: TEMPLATE_SAME_CYCLE_PRIORITY
    rule: RULE_SAME_CYCLE_PRIORITY_DECLARED
    status: template
    note: Activate for pairs such as clear-vs-set, write-vs-hardware-update, enable-vs-terminal-tick, or reset-vs-valid.
  - id: TEMPLATE_CONTRACT_PROOF_COVERAGE
    rule: RULE_CONTRACT_TO_PROOF_COVERAGE
    status: template
    note: Activate when a contract is promoted beyond draft or claims formal/assertion coverage.
  - id: TEMPLATE_FAULT_MODEL_COVERAGE
    rule: RULE_FAULT_MODEL_COVERAGE
    status: template
    note: Activate when a coverage point is used as load-bearing closure evidence and should be tied to killed requirement-relevant mutants.
  - id: TEMPLATE_VERIFICATION_ROLE_DECOMPOSITION
    rule: RULE_VERIFICATION_ROLE_DECOMPOSITION
    status: template
    note: Activate for signoff-grade TB architecture; use UVM concepts such as sequence, driver, monitor, reference model, scoreboard, coverage, env, and test without requiring UVM itself.
  - id: TEMPLATE_TB_METHODOLOGY_KERNEL
    rule: RULE_TB_METHODOLOGY_KERNEL
    status: template
    note: Activate when TB evidence is used for closure; choose directed, table-driven, transaction-based, random, assertion-assisted, formal-candidate, or PSS-style depth by IP profile.
  - id: TEMPLATE_CDC_CROSSING_COVERAGE
    rule: RULE_CDC_CROSSING_COVERAGE
    status: template
    note: Activate when SSOT clock_reset_domains/cdc_requirements/rdc_requirements make crossing safety a closure claim.
  - id: TEMPLATE_PROTOCOL_COMPLIANCE
    rule: RULE_PROTOCOL_COMPLIANCE
    status: template
    note: Activate for AXI, APB, streaming, valid/ready, or other interface protocol compliance closure.
  - id: TEMPLATE_TIMING_CLOSURE
    rule: RULE_TIMING_CLOSURE
    status: template
    note: Activate when SDC, STA, syn, or sta-post reports are part of closure or signoff evidence. Use target_clocks or target_frequency_mhz to derive create_clock; derive async clock groups or CDC exceptions from CDC/RDC facts; default input/output delay ratio is 0.5 of clock period unless the IP overrides it.
  - id: TEMPLATE_FUNCTIONAL_COVERAGE_CLOSURE
    rule: RULE_FUNCTIONAL_COVERAGE_CLOSURE
    status: template
    note: Activate when coverage_functional, coverage_ssot, or coverage refs are used to close requirements.
  - id: TEMPLATE_RESET_XPROP_COVERAGE
    rule: RULE_RESET_XPROP_COVERAGE
    status: template
    note: Activate for reset sequencing, async assert/sync deassert, reset-domain, or X-prop robustness closure.
