schema_version: oag_ambiguity_register.v1
ip: mctp_tx_assembler
ambiguities:
  - id: AMB_MCTP_TX_ASSEMBLER_RESET_BOUNDARY
    question: What concrete reset signal, polarity, timing, and observable default state define the first lock scope?
    status: resolved
    lock_required: true
    owner: happygrowth33
    resolution: >-
      Asynchronous active-low reset assert with synchronous deassert; on reset the
      IP is idle, no in-flight message, packet sequence number = 0, error counters
      cleared, CSR fields at defined reset values. (Human, intake round 4; see
      DEC_MCTP_TX_ASSEMBLER_RESET_BOUNDARY.)
    waiver_reason: null
    source_claim_refs:
      - CLAIM_TX_RESET_PLACEHOLDER
    decision_refs:
      - DEC_MCTP_TX_ASSEMBLER_RESET_BOUNDARY
    affects:
      - requirements
      - requirement_atoms
      - obligations
      - contracts
      - verification

  - id: AMB_TX_MSG_SOURCE_IF
    question: >-
      How is an outbound MCTP message delivered to the assembler (streaming bus
      with a last/length signal, SRAM descriptor + payload buffer with FW
      ownership, or register-pushed), and which attributes (dest EID, message
      tag, TO bit, message type/IC) travel with it?
    status: resolved
    lock_required: true
    owner: happygrowth33
    resolution: >-
      Streaming input bus with a last-flag marking message end; a sideband
      attribute word carries dest EID, message tag, TO, and message type/IC.
      (Human, intake round 2; see DT001_MSG_SOURCE_IF.)
    waiver_reason: null
    source_claim_refs:
      - CLAIM_TX_PRIMARY_INTENT
    decision_refs:
      - DT001_MSG_SOURCE_IF
    affects:
      - interfaces
      - requirements
      - contracts
      - verification
      - firmware

  - id: AMB_TX_EGRESS_BINDING
    question: >-
      What is the egress transport binding (AXI-Stream, SMBus/I2C, PCIe VDM,
      USB, KCS, serial, or generic packet bus) and the per-packet payload
      (transport unit / MTU) limit in bytes?
    status: resolved
    lock_required: true
    owner: happygrowth33
    resolution: >-
      Generic packet / AXI-Stream egress with a configurable max-payload (MTU)
      register. Default MTU value still to be fixed as an open sub-detail.
      (Human, intake round 2; see DT002_EGRESS_BINDING_MTU.)
    waiver_reason: null
    source_claim_refs:
      - CLAIM_TX_PRIMARY_INTENT
    decision_refs:
      - DT002_EGRESS_BINDING_MTU
    affects:
      - interfaces
      - contracts
      - rtl
      - verification

  - id: AMB_TX_FRAGMENTATION
    question: >-
      What is the fragmentation rule: fixed vs configurable max packet payload,
      how is the final short packet handled, what is the zero-length / minimum
      message policy, and is a single-packet message a special case?
    status: resolved
    lock_required: true
    owner: happygrowth33
    resolution: >-
      Configurable max payload; final packet may be short; single-packet message
      sets SOM=1 and EOM=1; zero-length messages rejected. (Human, intake round 3;
      see DT003_FRAGMENTATION_POLICY.)
    waiver_reason: null
    source_claim_refs:
      - CLAIM_TX_PRIMARY_INTENT
      - CLAIM_TX_ASSEMBLY_INFERENCE
    decision_refs:
      - DT003_FRAGMENTATION_POLICY
    affects:
      - requirements
      - requirement_atoms
      - contracts
      - verification

  - id: AMB_TX_HEADER_OWNERSHIP
    question: >-
      Which MCTP transport header fields does the IP compute (expected: SOM,
      EOM, packet sequence number) versus which are supplied by FW/caller
      (dest EID, source EID, TO, message tag, message type/IC), and is source
      EID fixed or programmable?
    status: resolved
    lock_required: true
    owner: happygrowth33
    resolution: >-
      IP computes SOM, EOM, and the 2-bit packet sequence number; caller
      supplies dest EID, TO, message tag, and message type/IC; source EID is
      programmable via CSR. (Human, intake round 2; see DT004_HEADER_FIELD_OWNERSHIP.)
    waiver_reason: null
    source_claim_refs:
      - CLAIM_TX_ASSEMBLY_INFERENCE
    decision_refs:
      - DT004_HEADER_FIELD_OWNERSHIP
    affects:
      - requirements
      - contracts
      - rtl
      - verification

  - id: AMB_TX_TAG_POLICY
    question: >-
      Does the assembler allocate/track message tags and the TO (tag owner)
      bit, or pass them through from the caller, and how many outstanding
      tags/messages are supported?
    status: resolved
    lock_required: true
    owner: happygrowth33
    resolution: >-
      Caller supplies message tag and TO (pass-through); IP does not allocate
      tags in v0; outstanding tags = 1 given one-message-at-a-time. (Human,
      intake round 3; see DT005_TAG_POLICY.)
    waiver_reason: null
    source_claim_refs:
      - CLAIM_TX_PRIMARY_INTENT
    decision_refs:
      - DT005_TAG_POLICY
    affects:
      - requirements
      - contracts
      - verification
      - firmware

  - id: AMB_TX_INTERLEAVE
    question: >-
      Can multiple messages be in flight (queued / interleaved across tags), or
      is the assembler strictly one-message-at-a-time, and what arbitration
      applies if queued?
    status: resolved
    lock_required: true
    owner: happygrowth33
    resolution: >-
      One message at a time for v0; no interleaving. A new message is accepted
      only after the current message has fully emitted (EOM). (Human, intake
      round 2; see DT006_MESSAGE_INTERLEAVE.)
    waiver_reason: null
    source_claim_refs:
      - CLAIM_TX_PRIMARY_INTENT
    decision_refs:
      - DT006_MESSAGE_INTERLEAVE
    affects:
      - requirements
      - contracts
      - rtl
      - verification

  - id: AMB_TX_ERROR_ABORT
    question: >-
      How are error conditions handled (source underrun mid-message, message
      exceeding a max size, egress backpressure/error, abort request): drop,
      stall, abort with forced EOM, or flag-and-discard?
    status: resolved
    lock_required: true
    owner: happygrowth33
    resolution: >-
      Egress backpressure stalls; source underrun and oversize raise a status
      flag and increment an error counter; IP never emits a partial message.
      (Human, intake round 3; see DT007_ERROR_ABORT_POLICY.)
    waiver_reason: null
    source_claim_refs:
      - CLAIM_TX_PRIMARY_INTENT
    decision_refs:
      - DT007_ERROR_ABORT_POLICY
    affects:
      - requirements
      - contracts
      - verification
      - firmware

  - id: AMB_TX_STATUS_IRQ
    question: >-
      What completion/error status, interrupt, and counter set is exposed
      (per-message done IRQ, error IRQ, dropped/sent counters), and over what
      CSR interface?
    status: resolved
    lock_required: true
    owner: happygrowth33
    resolution: >-
      Per-message done IRQ, error IRQ, and sent/dropped counters over a simple
      APB-like CSR interface. (Human, intake round 4; see DT008_STATUS_IRQ_CSR.)
    waiver_reason: null
    source_claim_refs:
      - CLAIM_TX_PRIMARY_INTENT
    decision_refs:
      - DT008_STATUS_IRQ_CSR
    affects:
      - interfaces
      - requirements
      - contracts
      - firmware

  - id: AMB_TX_SPEC_SUBSET
    question: >-
      Which MCTP base spec (DSP0236) version and feature subset is in v0 scope,
      and what fixed header version value and supported message types apply?
    status: resolved
    lock_required: true
    owner: happygrowth33
    resolution: >-
      v0 = DSP0236 transport packetization/header construction only; header
      version is a fixed value; message body is opaque (message-type-agnostic),
      no per-type validation. (Human, intake round 3; see DT009_SPEC_SUBSET.)
    waiver_reason: null
    source_claim_refs:
      - CLAIM_TX_ASSEMBLY_INFERENCE
    decision_refs:
      - DT009_SPEC_SUBSET
    affects:
      - requirements
      - contracts
      - verification
